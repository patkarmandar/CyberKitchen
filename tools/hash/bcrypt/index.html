<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bcrypt Hash - CyberKitchen</title>
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css"
    onerror="this.onerror=null;this.href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css'">
  <script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>
  <style>
    :root {
      --bg:#f8fafc; --surf:#ffffff; --inset:#f1f5f9; --inset2:#e4eaf1;
      --txt:#0f172a; --muted:#64748b; --acc:#3b82f6; --ok:#10b981;
      --err:#ef4444; --warn:#f59e0b; --bdr:#e2e8f0; --shd:rgba(0,0,0,.07);
    }
    [data-theme="dark"] {
      --bg:#0d1117; --surf:#161b22; --inset:#21262d; --inset2:#2d333b;
      --txt:#e6edf3; --muted:#8b949e; --bdr:#30363d; --shd:rgba(0,0,0,.4);
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { overflow-x:hidden; }
    body {
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      font-size:14.5px; background:var(--bg); color:var(--txt);
      padding:10px 14px; line-height:1.5;
      transition:background .25s,color .25s; overflow-x:hidden;
    }

    /* ── Header ─────────────────────────────────────────── */
    .container { max-width:1800px; margin:0 auto; }
    header {
      display:grid; grid-template-columns:1fr auto 1fr;
      align-items:center; margin-bottom:10px; min-height:38px;
    }
    .hdr-left  { display:flex; align-items:center; justify-content:flex-start; min-width:0; }
    .hdr-right { display:flex; align-items:center; justify-content:flex-end; gap:6px; min-width:0; }
    h1 {
      text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding:0 8px;
      font-size:22px; font-weight:800; letter-spacing:-.3px;
      background:linear-gradient(130deg,#10b981 0%,#3b82f6 55%,#6366f1 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .home-link {
      display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:600;
      color:var(--muted); text-decoration:none; padding:5px 10px;
      border:1px solid var(--bdr); border-radius:7px; background:var(--surf);
      transition:all .18s; white-space:nowrap;
    }
    .home-link:hover { color:var(--acc); border-color:var(--acc); background:var(--inset); }
    .home-link i { font-size:12px; flex-shrink:0; }
    .icon-btn {
      width:34px; height:34px; border-radius:8px; background:var(--surf);
      border:1px solid var(--bdr); cursor:pointer; display:flex; align-items:center;
      justify-content:center; color:var(--muted); font-size:14px; transition:all .2s;
    }
    .icon-btn:hover { border-color:var(--acc); color:var(--acc); transform:scale(1.08); }

    /* ── Layout ─────────────────────────────────────────── */
    .layout { display:grid; grid-template-columns:1fr 330px 1fr; gap:10px; }
    .layout > * { min-width:0; }
    .panel {
      background:var(--surf); border:1px solid var(--bdr); border-radius:10px;
      padding:12px; box-shadow:0 1px 4px var(--shd);
      display:flex; flex-direction:column; gap:8px;
      height:calc(100vh - 70px); min-height:480px; max-height:840px;
      min-width:0; overflow:hidden;
    }
    .panel-hdr {
      font-size:13px; font-weight:700; letter-spacing:.03em;
      color:var(--txt); display:flex; align-items:center; gap:6px; flex-shrink:0;
    }
    .panel-hdr i { font-size:13px; color:var(--muted); }

    /* ── Toolbar ─────────────────────────────────────────── */
    .toolbar { display:flex; align-items:center; gap:5px; flex-wrap:wrap; flex-shrink:0; }
    .tb-sep  { width:1px; height:14px; background:var(--bdr); flex-shrink:0; margin:0 2px; }
    .tb-fill { flex:1; min-width:0; }
    @media (max-width:600px) {
      .toolbar { gap:4px; }
      .toolbar .btn-text { display:none; }
      .swap-btn .swap-text { display:none; }
      .swap-btn { padding:4px 7px; }
      .tb-sep { display:none; }
      .btn.xs { padding:4px 7px; }
    }

    /* ── Textareas ───────────────────────────────────────── */
    textarea {
      flex:1; width:100%; resize:none; min-height:0;
      padding:9px 10px;
      font-family:'SF Mono','Fira Code','Menlo','Consolas',monospace;
      font-size:14px; line-height:1.65; background:var(--inset); color:var(--txt);
      border:1px solid var(--bdr); border-radius:7px;
      outline:none !important; box-shadow:none !important; transition:border-color .18s;
    }
    textarea:focus { border-color:var(--acc); }
    textarea::placeholder { color:var(--muted); opacity:.55; font-style:italic; }
    textarea::-webkit-scrollbar { width:6px; }
    textarea::-webkit-scrollbar-thumb { background:var(--bdr); border-radius:3px; }
    textarea.verify-match { border-color:var(--ok) !important; background:rgba(16,185,129,.05) !important; }
    textarea.verify-fail  { border-color:var(--err) !important; background:rgba(239,68,68,.05) !important; }

    /* ── Controls ────────────────────────────────────────── */
    .ctrl-scroll {
      flex:1; display:flex; flex-direction:column; gap:7px;
      overflow-y:auto; overflow-x:hidden; min-height:0; padding-right:2px;
    }
    .ctrl-scroll::-webkit-scrollbar { width:4px; }
    .ctrl-scroll::-webkit-scrollbar-thumb { background:var(--bdr); border-radius:2px; }
    .field { display:flex; flex-direction:column; gap:3px; }
    .field > label { font-size:12px; font-weight:600; color:var(--muted); }

    /* ── Form controls ───────────────────────────────────── */
    input[type="text"], input[type="number"], input[type="password"], select {
      background:var(--inset); color:var(--txt); border:1px solid var(--bdr);
      border-radius:6px; padding:6px 8px; font-size:13px;
      outline:none !important; box-shadow:none !important;
      transition:border-color .18s; width:100%;
      -webkit-appearance:none; appearance:none;
    }
    input:valid, input:invalid, input:-webkit-autofill,
    input:-webkit-autofill:hover, input:-webkit-autofill:focus {
      border-color:var(--bdr) !important; box-shadow:none !important; outline:none !important;
    }
    input:focus, select:focus { border-color:var(--acc); background:var(--bg); }
    .inp-sm { padding:5px 7px !important; font-size:12px !important; }
    .row2 { display:grid; grid-template-columns:1fr 1fr; gap:5px; }

    /* ── Encoding button groups ──────────────────────────── */
    .enc-group-label {
      font-size:10px; font-weight:700; color:var(--muted);
      letter-spacing:.06em; text-transform:uppercase; padding-left:1px;
    }
    .enc-grid   { display:grid; grid-template-columns:repeat(3,1fr); gap:4px; }
    .enc-grid-2 { display:grid; grid-template-columns:repeat(2,1fr); gap:4px; }
    .enc-grid-6 { display:grid; grid-template-columns:repeat(6,1fr); gap:4px; }
    .enc-btn {
      padding:5px 3px; border:1px solid var(--bdr); border-radius:6px;
      background:var(--inset); color:var(--muted); font-size:11px; font-weight:600;
      cursor:pointer; text-align:center; transition:all .15s; white-space:nowrap;
      overflow:hidden; text-overflow:ellipsis;
    }
    .enc-btn:hover { background:var(--inset2); color:var(--txt); border-color:var(--muted); }
    .enc-btn.active { background:var(--acc); color:#fff; border-color:var(--acc); }

    /* ── Info bar ────────────────────────────────────────── */
    .info-bar {
      display:flex; align-items:center; justify-content:space-between; gap:8px;
      background:var(--inset); border:1px solid var(--bdr);
      border-radius:6px; padding:4px 9px; font-size:11px; color:var(--muted);
      flex-shrink:0;
    }
    .info-bar span:first-child { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .badge {
      font-size:10px; font-weight:700; padding:2px 7px; border-radius:4px;
      letter-spacing:.04em; background:var(--inset2); color:var(--muted); flex-shrink:0;
    }
    .badge-ok   { background:rgba(16,185,129,.15); color:#10b981; }
    .badge-err  { background:rgba(239,68,68,.15);  color:var(--err); }
    .badge-inf  { background:rgba(59,130,246,.15);  color:#3b82f6; }
    .badge-warn { background:rgba(245,158,11,.15);  color:var(--warn); }

    /* ── Buttons ─────────────────────────────────────────── */
    .btn {
      border:none; border-radius:6px; font-weight:400; cursor:pointer;
      display:inline-flex; align-items:center; justify-content:center; gap:5px;
      transition:all .16s; white-space:nowrap; flex-shrink:0; font-size:12px;
    }
    .btn:active { transform:scale(.95); }
    .btn.xs { padding:4px 8px; font-size:12px; }
    .btn.sm { padding:5px 10px; font-size:13px; }
    .btn-ghost { background:var(--inset); color:var(--txt); border:1px solid var(--bdr); }
    .btn-ghost:hover { background:var(--inset2); }

    .btn-encode {
      flex:1; padding:9px 12px; font-size:13px; font-weight:700;
      background:linear-gradient(135deg,#10b981,#059669); color:#fff;
      border:none; border-radius:6px; cursor:pointer;
      display:flex; align-items:center; justify-content:center; gap:6px;
      transition:all .18s;
    }
    .btn-decode {
      flex:1; padding:9px 12px; font-size:13px; font-weight:700;
      background:linear-gradient(135deg,#3b82f6,#2563eb); color:#fff;
      border:none; border-radius:6px; cursor:pointer;
      display:flex; align-items:center; justify-content:center; gap:6px;
      transition:all .18s;
    }
    .btn-encode:hover, .btn-decode:hover {
      filter:brightness(1.1); transform:translateY(-1px); box-shadow:0 4px 12px var(--shd);
    }
    .btn-encode:disabled, .btn-decode:disabled {
      opacity:.5; cursor:not-allowed; transform:none !important; filter:none !important;
    }
    .btn-verify {
      width:100%; padding:8px; font-size:12px; font-weight:600;
      background:var(--inset); color:var(--txt);
      border:1px solid var(--bdr); border-radius:6px; cursor:pointer;
      display:flex; align-items:center; justify-content:center; gap:6px;
      transition:all .18s;
    }
    .btn-verify:hover { background:var(--inset2); }

    .swap-btn {
      background:transparent; border:1px solid var(--bdr); color:var(--muted);
      border-radius:6px; padding:4px 8px; cursor:pointer; flex-shrink:0; font-size:13px;
      display:inline-flex; align-items:center; gap:4px; transition:all .18s;
    }
    .swap-btn:hover { color:var(--acc); border-color:var(--acc); }

    /* ── Toggle ──────────────────────────────────────────── */
    .toggle-row   { display:flex; align-items:center; justify-content:space-between; }
    .toggle-label { font-size:11px; font-weight:600; color:var(--muted); }
    .toggle { position:relative; width:36px; height:20px; flex-shrink:0; }
    .toggle input { opacity:0; width:0; height:0; }
    .toggle-slider {
      position:absolute; inset:0; background:var(--inset2); border:1px solid var(--bdr);
      border-radius:20px; cursor:pointer; transition:.2s;
    }
    .toggle-slider:before {
      content:''; position:absolute; width:14px; height:14px; left:2px; top:2px;
      background:var(--muted); border-radius:50%; transition:.2s;
    }
    .toggle input:checked + .toggle-slider { background:var(--acc); border-color:var(--acc); }
    .toggle input:checked + .toggle-slider:before { transform:translateX(16px); background:#fff; }

    .key-row { display:grid; grid-template-columns:1fr auto; gap:5px; align-items:center; }
    .act-row { display:flex; gap:7px; }
    .bot-row { display:flex; gap:6px; }
    .divider { height:1px; background:var(--bdr); flex-shrink:0; }
    .spacer  { flex:1; min-height:2px; }

    /* ── Status ──────────────────────────────────────────── */
    .status {
      padding:6px 10px; border-radius:6px; font-size:13px;
      display:none; flex-shrink:0; animation:pop .2s ease;
    }
    .status.success { background:rgba(16,185,129,.12); color:var(--ok);   border:1px solid rgba(16,185,129,.25); }
    .status.error   { background:rgba(239,68,68,.12);  color:var(--err);  border:1px solid rgba(239,68,68,.25); }
    .status.warn    { background:rgba(245,158,11,.12); color:var(--warn); border:1px solid rgba(245,158,11,.25); }
    @keyframes pop { from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)} }

    /* ── Responsive ──────────────────────────────────────── */
    @media (max-width:1100px) {
      .layout { grid-template-columns:1fr; }
      .panel  { height:auto; max-height:none; min-height:240px; }
      textarea { min-height:140px; }
    }
    @media (max-width:540px) {
      .home-link .link-text { display:none; }
      .home-link { padding:5px 8px; gap:4px; }
    }
    @media (max-width:600px) {
      body { padding:6px 8px; } h1 { font-size:16px; }
    }
    @media (max-width:480px) {
      .enc-grid-6 { grid-template-columns:repeat(3,1fr); }
      .act-row { gap:5px; }
      .btn-encode, .btn-decode { font-size:12px; padding:8px 8px; }
      .bot-row .btn { font-size:11px; padding:5px 6px; }
      .info-bar { gap:4px; padding:4px 6px; }
      .info-bar span:first-child { font-size:10px; }
      .badge { font-size:9px; padding:2px 5px; }
      .enc-btn { font-size:10px; padding:4px 2px; }
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="hdr-left">
      <a href="/CyberKitchen" class="home-link" title="Back to CyberKitchen">
        <i class="fa-solid fa-arrow-left"></i>
        <span class="link-text">CyberKitchen</span>
      </a>
    </div>
    <h1>Bcrypt Hash</h1>
    <div class="hdr-right">
      <button class="icon-btn" id="themeBtn" onclick="toggleTheme()" title="Toggle theme">
        <i class="fa-solid fa-moon" id="themeIcon"></i>
      </button>
    </div>
  </header>

  <div class="layout">

    <!-- ══ LEFT: Password ════════════════════════════════════ -->
    <div class="panel">
      <div class="panel-hdr"><i class="fa-solid fa-key"></i> PASSWORD</div>
      <div class="toolbar">
        <button class="btn btn-ghost xs" onclick="copyText('inputData')"><i class="fa-regular fa-copy"></i><span class="btn-text"> Copy</span></button>
        <button class="btn btn-ghost xs" onclick="clearField('inputData')"><i class="fa-regular fa-trash-can"></i><span class="btn-text"> Clear</span></button>
        <button class="btn btn-ghost xs" onclick="dlText('inputData','password.txt')"><i class="fa-solid fa-download"></i><span class="btn-text"> Save</span></button>
        <div class="tb-sep"></div>
        <button class="btn btn-ghost xs" onclick="genPassword()"><i class="fa-solid fa-wand-magic-sparkles"></i><span class="btn-text"> Generate</span></button>
        <div class="tb-fill"></div>
        <span id="strengthBadge" class="badge">-</span>
      </div>
      <textarea id="inputData" placeholder="Type or paste password to hash..."></textarea>
      <div class="info-bar">
        <span id="inputInfo">Ready - enter a password</span>
        <span id="inputLen" class="badge">0 chars</span>
      </div>
    </div>

    <!-- ══ MIDDLE: Configuration ══════════════════════════════ -->
    <div class="panel">
      <div class="panel-hdr"><i class="fa-solid fa-gear"></i> CONFIGURATION</div>
      <div class="ctrl-scroll">

        <!-- Cost Factor -->
        <div class="enc-group-label">Cost Factor (rounds = 2ⁿ)</div>
        <div class="enc-grid-6">
          <button class="enc-btn" id="cost_8"  onclick="setCost(8)">8</button>
          <button class="enc-btn" id="cost_10" onclick="setCost(10)">10</button>
          <button class="enc-btn active" id="cost_11" onclick="setCost(11)">11</button>
          <button class="enc-btn" id="cost_12" onclick="setCost(12)">12</button>
          <button class="enc-btn" id="cost_13" onclick="setCost(13)">13</button>
          <button class="enc-btn" id="cost_14" onclick="setCost(14)">14</button>
        </div>
        <div class="info-bar">
          <span id="costInfo">Cost 11 · 2,048 iterations · good balance</span>
          <span id="costBadge" class="badge badge-ok">~150 ms</span>
        </div>

        <div class="divider"></div>

        <!-- Salt -->
        <div class="enc-group-label">Salt</div>
        <div class="toggle-row">
          <span class="toggle-label">Auto-generate salt (recommended)</span>
          <label class="toggle">
            <input type="checkbox" id="autoSalt" checked onchange="toggleSaltField()">
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div id="saltField" style="display:none">
          <div class="key-row">
            <input type="text" id="customSalt" class="inp-sm" placeholder="22-char bcrypt salt (Base64-like)" maxlength="29">
            <button class="btn btn-ghost xs" onclick="genSalt()" title="Generate random salt"><i class="fa-solid fa-arrows-rotate"></i></button>
          </div>
        </div>

        <div class="divider"></div>

        <!-- Output Format -->
        <div class="enc-group-label">Output Format</div>
        <div class="enc-grid">
          <button class="enc-btn active" id="fmt_full"     onclick="setFmt('full')">Full Hash</button>
          <button class="enc-btn"        id="fmt_hashonly" onclick="setFmt('hashonly')">Hash Only</button>
          <button class="enc-btn"        id="fmt_json"     onclick="setFmt('json')">JSON</button>
        </div>

        <!-- Verify result bar (mirrors detect bar from index) -->
        <div class="info-bar" id="verifyBar" style="display:none">
          <span id="verifyMsg">-</span>
          <span class="badge" id="verifyBadge">-</span>
        </div>

        <div class="divider"></div>

        <div class="act-row">
          <button class="btn-encode" id="hashBtn" onclick="doHash()" title="Hash password (Ctrl+E)">
            <i class="fa-solid fa-lock"></i> Hash
            <i class="fa-solid fa-arrow-right" style="font-size:11px"></i>
          </button>
          <button class="btn-decode" id="verifyBtn" onclick="doVerify()" title="Verify password vs hash (Ctrl+D)">
            <i class="fa-solid fa-arrow-left" style="font-size:11px"></i> Verify
            <i class="fa-solid fa-circle-check"></i>
          </button>
        </div>

        <button class="btn-verify" onclick="inspectHash()">
          <i class="fa-solid fa-magnifying-glass"></i> Inspect Hash
        </button>

        <div id="status" class="status"></div>

        <div class="spacer"></div>
        <div class="divider"></div>

        <div style="font-size:12px;color:var(--muted);text-align:center;line-height:2;font-weight:700">
          Ctrl+E &nbsp;Hash &nbsp;&nbsp; Ctrl+D &nbsp;Verify &nbsp;&nbsp; Ctrl+R &nbsp;Reset
        </div>

        <div class="bot-row">
          <button class="btn btn-ghost sm" style="flex:1" onclick="shareConfig()">
            <i class="fa-solid fa-link"></i> Share URL
          </button>
          <button class="btn btn-ghost sm" style="flex:1" onclick="resetAll()">
            <i class="fa-solid fa-rotate"></i> Reset
          </button>
        </div>

      </div>
    </div>

    <!-- ══ RIGHT: Hash Output ════════════════════════════════ -->
    <div class="panel">
      <div class="panel-hdr"><i class="fa-solid fa-fingerprint"></i> HASH OUTPUT</div>
      <div class="toolbar">
        <button class="btn btn-ghost xs" onclick="copyText('outputData')"><i class="fa-regular fa-copy"></i><span class="btn-text"> Copy</span></button>
        <button class="btn btn-ghost xs" onclick="clearField('outputData')"><i class="fa-regular fa-trash-can"></i><span class="btn-text"> Clear</span></button>
        <button class="btn btn-ghost xs" onclick="dlText('outputData','bcrypt-hash.txt')"><i class="fa-solid fa-download"></i><span class="btn-text"> Save</span></button>
        <div class="tb-fill"></div>
        <span id="outputBadge" class="badge">-</span>
      </div>
      <textarea id="outputData" placeholder="bcrypt hash appears here...&#10;&#10;Tip: paste an existing hash here, then click Verify or Inspect Hash."></textarea>
      <div class="info-bar">
        <span id="outputInfo">-</span>
        <span id="outputLen" class="badge">0 chars</span>
      </div>
    </div>

  </div>
</div>

<script>
'use strict';

/* ── bcryptjs compat shim ────────────────────────────────────
   jsdelivr's bcryptjs@2.4.3 exposes the library as a plain
   module export (window.bcrypt) rather than dcodeIO.bcrypt.
   We normalise both shapes into a single _bcrypt handle so
   the rest of the code never changes.
───────────────────────────────────────────────────────────── */
function getBcrypt(){
  if(typeof dcodeIO !== 'undefined' && dcodeIO.bcrypt) return dcodeIO.bcrypt;
  if(typeof bcrypt  !== 'undefined') return bcrypt;
  return null;
}

var $ = function(id){ return document.getElementById(id); };
function gv(id){ return $(id).value; }
function sv(id,v){ $(id).value = v; }

var _cost = 11;
var _fmt  = 'full';
var _st;

/* ── Input listeners ─────────────────────────────────────── */
$('inputData').addEventListener('input', onInputChange);
$('outputData').addEventListener('input', function(){
  $('outputLen').textContent = gv('outputData').length + ' chars';
});

function onInputChange(){
  var v = gv('inputData');
  $('inputLen').textContent = v.length + ' chars';
  updateStrength(v);
}

function updateStrength(pw){
  var b = $('strengthBadge'), info = $('inputInfo');
  if(!pw){ b.textContent='-'; b.className='badge'; info.textContent='Ready - enter a password'; return; }
  var score=0;
  if(pw.length>=8)score++; if(pw.length>=12)score++;
  if(/[A-Z]/.test(pw))score++; if(/[a-z]/.test(pw))score++;
  if(/[0-9]/.test(pw))score++; if(/[^A-Za-z0-9]/.test(pw))score++;
  var idx=Math.min(score,6);
  var lbl=['Too Short','Weak','Fair','Good','Strong','Very Strong','Excellent'];
  var cls=['badge-err','badge-err','badge-warn','badge-warn','badge-ok','badge-ok','badge-ok'];
  b.textContent=lbl[idx]; b.className='badge '+cls[idx];
  var pool=(/[a-z]/.test(pw)?26:0)+(/[A-Z]/.test(pw)?26:0)+(/[0-9]/.test(pw)?10:0)+(/[^A-Za-z0-9]/.test(pw)?32:0)||26;
  info.textContent=pw.length+' chars · ~'+Math.round(pw.length*Math.log2(pool))+' bits entropy';
}

/* ── Cost ────────────────────────────────────────────────── */
var COST_INFO = {
  8:  {time:'~20 ms',  cls:'badge-ok',   desc:'Very fast - dev/testing only'},
  10: {time:'~80 ms',  cls:'badge-ok',   desc:'Fast - minimum for production'},
  11: {time:'~150 ms', cls:'badge-ok',   desc:'Good balance of speed & security'},
  12: {time:'~300 ms', cls:'badge-inf',  desc:'Recommended for most production apps'},
  13: {time:'~600 ms', cls:'badge-warn', desc:'Slow - high-security contexts'},
  14: {time:'~1.2 s',  cls:'badge-warn', desc:'Very slow - use with caution in browser'}
};

function setCost(n){
  _cost = n;
  [8,10,11,12,13,14].forEach(function(c){ $('cost_'+c).classList.toggle('active', c===n); });
  var ci = COST_INFO[n];
  $('costInfo').textContent = 'Cost '+n+' · '+Math.pow(2,n).toLocaleString()+' iterations · '+ci.desc;
  $('costBadge').textContent = ci.time;
  $('costBadge').className = 'badge '+ci.cls;
}

/* ── Format ──────────────────────────────────────────────── */
function setFmt(f){
  _fmt = f;
  ['full','hashonly','json'].forEach(function(x){ $('fmt_'+x).classList.toggle('active', x===f); });
}

/* ── Salt ────────────────────────────────────────────────── */
function toggleSaltField(){
  $('saltField').style.display = $('autoSalt').checked ? 'none' : 'block';
}
function genSalt(){
  var bc = getBcrypt();
  if(!bc){ showStatus('bcrypt library not loaded','error'); return; }
  var s = bc.genSaltSync(_cost);
  sv('customSalt', s.slice(7)); // strip $2a$XX$ prefix
}

/* ── Generate password ───────────────────────────────────── */
function genPassword(){
  var chars='abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()-_=+';
  var arr=new Uint8Array(16); crypto.getRandomValues(arr);
  sv('inputData', Array.from(arr).map(function(x){ return chars[x%chars.length]; }).join(''));
  onInputChange();
  showStatus('Random password generated','success');
}

/* ── HASH ────────────────────────────────────────────────── */
function doHash(){
  var pw = gv('inputData').trim();
  if(!pw){ showStatus('Enter a password to hash','warn'); return; }
  var bc = getBcrypt();
  if(!bc){ showStatus('bcrypt library not loaded - check network','error'); return; }
  var salt;
  if($('autoSalt').checked){
    salt = bc.genSaltSync(_cost);
  } else {
    var cs = gv('customSalt').trim();
    if(cs.length < 22){ showStatus('Custom salt must be ≥ 22 chars','error'); return; }
    salt = '$2a$'+(_cost<10?'0':'')+_cost+'$'+cs.slice(0,22);
  }
  $('hashBtn').disabled = true;
  var t0 = performance.now();
  // Use synchronous path - avoids broken async worker under tracking-prevention
  setTimeout(function(){
    try {
      var hash = bc.hashSync(pw, salt);
      var elapsed = Math.round(performance.now()-t0);
      var out;
      if(_fmt==='full'){
        out = hash;
      } else if(_fmt==='hashonly'){
        out = hash.slice(7);
      } else {
        var p = parseHashStr(hash);
        out = JSON.stringify({algorithm:'bcrypt',cost:p.cost,salt:p.salt,hash:p.hashPart,full:hash,elapsed_ms:elapsed},null,2);
      }
      sv('outputData', out);
      $('outputLen').textContent = out.length+' chars';
      $('outputInfo').textContent = 'Cost '+_cost+' · 60-char hash · '+elapsed+' ms';
      $('outputBadge').textContent = 'Hashed'; $('outputBadge').className = 'badge badge-ok';
      $('outputData').classList.remove('verify-match','verify-fail');
      $('verifyBar').style.display = 'none';
      showStatus('Password hashed in '+elapsed+' ms','success');
    } catch(e){
      showStatus('Hash error: '+e.message,'error');
    } finally {
      $('hashBtn').disabled = false;
    }
  }, 0);
}

/* ── VERIFY ──────────────────────────────────────────────── */
function doVerify(){
  var pw=gv('inputData').trim(), hash=gv('outputData').trim();
  if(!pw)  { showStatus('Enter a password in the left panel','warn'); return; }
  if(!hash){ showStatus('Paste a bcrypt hash in the right panel','warn'); return; }
  if(!hash.startsWith('$2')){ showStatus('Not a valid bcrypt hash (must start with $2)','error'); return; }
  var bc = getBcrypt();
  if(!bc){ showStatus('bcrypt library not loaded','error'); return; }
  $('verifyBtn').disabled = true;
  var t0 = performance.now();
  // Use synchronous path - avoids broken async worker under tracking-prevention
  setTimeout(function(){
    try {
      var result = bc.compareSync(pw, hash);
      var elapsed = Math.round(performance.now()-t0);
      $('verifyBar').style.display = 'flex';
      if(result){
        $('verifyMsg').textContent='Password matches hash · '+elapsed+' ms';
        $('verifyBadge').textContent='Match'; $('verifyBadge').className='badge badge-ok';
        $('outputData').classList.add('verify-match'); $('outputData').classList.remove('verify-fail');
        showStatus('✓ Password matches! ('+elapsed+' ms)','success');
      } else {
        $('verifyMsg').textContent='Password does NOT match hash';
        $('verifyBadge').textContent='No Match'; $('verifyBadge').className='badge badge-err';
        $('outputData').classList.add('verify-fail'); $('outputData').classList.remove('verify-match');
        showStatus('✗ Password does not match','error');
      }
    } catch(e){
      $('verifyBar').style.display = 'flex';
      $('verifyMsg').textContent='Error: '+e.message;
      $('verifyBadge').textContent='Error'; $('verifyBadge').className='badge badge-err';
      showStatus('Verification error','error');
    } finally {
      $('verifyBtn').disabled = false;
    }
  }, 0);
}

/* ── INSPECT ─────────────────────────────────────────────── */
function inspectHash(){
  var h=gv('outputData').trim();
  if(!h){ showStatus('No hash in right panel','warn'); return; }
  if(!h.startsWith('$2')){ showStatus('Not a valid bcrypt hash','error'); return; }
  var p=parseHashStr(h);
  if(p.cost==='?'){ showStatus('Could not parse hash structure','error'); return; }
  sv('outputData',[
    'Algorithm:  bcrypt',
    'Version:    $'+p.version,
    'Cost:       '+p.cost+' (2^'+p.cost+' = '+Math.pow(2,p.cost).toLocaleString()+' iterations)',
    'Salt:       '+p.salt,
    'Hash part:  '+p.hashPart,
    'Full hash:  '+h,
    'Total len:  '+h.length+' chars'
  ].join('\n'));
  $('outputLen').textContent=gv('outputData').length+' chars';
  showStatus('Hash inspected','success');
}

function parseHashStr(h){
  var m=h.match(/^\$(\d[a-z])\$(\d{2})\$(.{53})$/);
  if(!m)return{version:'?',cost:'?',salt:'?',hashPart:'?'};
  return{version:m[1],cost:parseInt(m[2]),salt:m[3].slice(0,22),hashPart:m[3].slice(22)};
}

/* ── Clipboard / download ────────────────────────────────── */
function copyText(id){
  var v=gv(id); if(!v){showStatus('Nothing to copy','warn');return;}
  var ok=function(){showStatus('Copied to clipboard','success');};
  var fail=function(){try{$(id).select();document.execCommand('copy');ok();}catch(e){showStatus('Copy failed','error');}};
  (navigator.clipboard&&navigator.clipboard.writeText?navigator.clipboard.writeText(v):Promise.reject()).then(ok).catch(fail);
}
function clearField(id){
  sv(id,'');
  if(id==='outputData'){
    $('outputData').classList.remove('verify-match','verify-fail');
    $('outputBadge').textContent='-'; $('outputBadge').className='badge';
    $('outputInfo').textContent='-'; $('outputLen').textContent='0 chars';
    $('verifyBar').style.display='none';
  } else { onInputChange(); }
  showStatus('Cleared','success');
}
function dlText(id,name){
  var v=gv(id); if(!v){showStatus('Nothing to save','warn');return;}
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([v],{type:'text/plain'}));
  a.download=name; a.click(); URL.revokeObjectURL(a.href);
  showStatus('Download started','success');
}

/* ── Status ──────────────────────────────────────────────── */
function showStatus(msg,type){
  type=type||'success'; var s=$('status');
  s.textContent=msg; s.className='status '+type; s.style.display='block';
  clearTimeout(_st); _st=setTimeout(function(){s.style.display='none';},4000);
}

/* ── Share URL ───────────────────────────────────────────── */
function b64uEnc(str){var b=new TextEncoder().encode(str),s='';b.forEach(function(x){s+=String.fromCharCode(x);});return btoa(s).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');}
function b64uDec(str){str=str.replace(/-/g,'+').replace(/_/g,'/');while(str.length%4)str+='=';var b=atob(str),arr=new Uint8Array(b.length);for(var i=0;i<b.length;i++)arr[i]=b.charCodeAt(i);return new TextDecoder().decode(arr);}
function shareConfig(){
  var state={v:1,cost:_cost,fmt:_fmt,input:gv('inputData'),output:gv('outputData')};
  try{
    var url=location.href.split('#')[0]+'#s='+b64uEnc(JSON.stringify(state));
    var ok=function(){showStatus('Share URL copied to clipboard','success');};
    (navigator.clipboard&&navigator.clipboard.writeText?navigator.clipboard.writeText(url):Promise.reject()).then(ok).catch(function(){prompt('Copy URL:',url);});
  }catch(e){showStatus('Could not generate URL','error');}
}
function loadFromHash(){
  var hash=location.hash; if(!hash||hash.indexOf('s=')===-1)return;
  try{
    var enc=new URLSearchParams(hash.slice(1)).get('s'); if(!enc)return;
    var st=JSON.parse(b64uDec(enc));
    if(st.cost)setCost(st.cost);
    if(st.fmt) setFmt(st.fmt);
    if(st.input!==undefined){sv('inputData',st.input);onInputChange();}
    if(st.output!==undefined){sv('outputData',st.output);$('outputLen').textContent=st.output.length+' chars';}
    showStatus('Configuration loaded from URL','success');
  }catch(e){console.warn('loadFromHash:',e);}
}

/* ── Reset ───────────────────────────────────────────────── */
function resetAll(){
  if(!confirm('Reset all fields?'))return;
  sv('inputData',''); sv('outputData','');
  $('outputData').classList.remove('verify-match','verify-fail');
  $('verifyBar').style.display='none';
  $('outputBadge').textContent='-'; $('outputBadge').className='badge';
  $('outputInfo').textContent='-'; $('outputLen').textContent='0 chars';
  $('autoSalt').checked=true; toggleSaltField();
  setCost(11); setFmt('full');
  try{history.replaceState(null,'',location.pathname+location.search);}catch(e){}
  onInputChange();
  showStatus('Reset complete','success');
}

/* ── Theme ───────────────────────────────────────────────── */
function toggleTheme(){var n=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',n);localStorage.setItem('bc-theme',n);$('themeIcon').className=n==='dark'?'fa-solid fa-sun':'fa-solid fa-moon';}
function loadTheme(){var t=localStorage.getItem('bc-theme')||'light';document.documentElement.setAttribute('data-theme',t);$('themeIcon').className=t==='dark'?'fa-solid fa-sun':'fa-solid fa-moon';}

/* ── Keyboard shortcuts ──────────────────────────────────── */
document.addEventListener('keydown',function(e){
  if(!(e.ctrlKey||e.metaKey))return;
  if(e.key.toLowerCase()==='e'){e.preventDefault();doHash();}
  if(e.key.toLowerCase()==='d'){e.preventDefault();doVerify();}
  if(e.key.toLowerCase()==='r'){e.preventDefault();resetAll();}
});

/* ── Init ────────────────────────────────────────────────── */
loadTheme();
setCost(11);
setFmt('full');
loadFromHash();
</script>
