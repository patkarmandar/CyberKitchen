<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Encoder / Decoder - CyberKitchen</title>
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    onerror="this.onerror=null;this.href='https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css'">
  <style>
    :root {
      --bg:#f8fafc; --surf:#ffffff; --inset:#f1f5f9; --inset2:#e4eaf1;
      --txt:#0f172a; --muted:#64748b; --acc:#3b82f6; --ok:#10b981;
      --err:#ef4444; --warn:#f59e0b; --bdr:#e2e8f0; --shd:rgba(0,0,0,.07);
    }
    [data-theme="dark"] {
      --bg:#0d1117; --surf:#161b22; --inset:#21262d; --inset2:#2d333b;
      --txt:#e6edf3; --muted:#8b949e; --bdr:#30363d; --shd:rgba(0,0,0,.4);
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { overflow-x:hidden; }
    body {
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      font-size:14.5px; background:var(--bg); color:var(--txt);
      padding:10px 14px; line-height:1.5;
      transition:background .25s,color .25s; overflow-x:hidden;
    }

    /* ── Header ─────────────────────────────────────────── */
    .container { max-width:1800px; margin:0 auto; }
    header {
      display:grid; grid-template-columns:1fr auto 1fr;
      align-items:center; margin-bottom:10px; min-height:38px;
    }
    .hdr-left  { display:flex; align-items:center; justify-content:flex-start; min-width:0; }
    .hdr-right { display:flex; align-items:center; justify-content:flex-end; gap:6px; min-width:0; }
    h1 {
      text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding:0 8px;
      font-size:22px; font-weight:800; letter-spacing:-.3px;
      background:linear-gradient(130deg,#f59e0b 0%,#ef4444 40%,#8b5cf6 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .home-link {
      display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:600;
      color:var(--muted); text-decoration:none; padding:5px 10px;
      border:1px solid var(--bdr); border-radius:7px; background:var(--surf);
      transition:all .18s; white-space:nowrap;
    }
    .home-link:hover { color:var(--acc); border-color:var(--acc); background:var(--inset); }
    .home-link i { font-size:12px; flex-shrink:0; }
    .icon-btn {
      width:34px; height:34px; border-radius:8px; background:var(--surf);
      border:1px solid var(--bdr); cursor:pointer; display:flex; align-items:center;
      justify-content:center; color:var(--muted); font-size:14px; transition:all .2s;
    }
    .icon-btn:hover { border-color:var(--acc); color:var(--acc); transform:scale(1.08); }

    /* ── Layout ─────────────────────────────────────────── */
    .layout { display:grid; grid-template-columns:1fr 330px 1fr; gap:10px; }
    .panel {
      background:var(--surf); border:1px solid var(--bdr); border-radius:10px;
      padding:12px; box-shadow:0 1px 4px var(--shd);
      display:flex; flex-direction:column; gap:8px;
      height:calc(100vh - 70px); min-height:480px; max-height:840px;
    }
    .panel-hdr {
      font-size:13px; font-weight:700; letter-spacing:.03em;
      color:var(--txt); display:flex; align-items:center; gap:6px; flex-shrink:0;
    }
    .panel-hdr i { font-size:13px; color:var(--muted); }

    /* ── Toolbar ─────────────────────────────────────────── */
    .toolbar { display:flex; align-items:center; gap:5px; flex-wrap:nowrap; flex-shrink:0; }
    .tb-sep  { width:1px; height:14px; background:var(--bdr); flex-shrink:0; margin:0 2px; }
    .tb-fill { flex:1; min-width:0; }
    @media (max-width:600px) {
      .toolbar { gap:4px; }
      .toolbar .btn-text { display:none; }
      .swap-btn .swap-text { display:none; }
      .swap-btn { padding:4px 7px; }
      .tb-sep { display:none; }
      .btn.xs { padding:4px 7px; }
    }

    /* ── Textareas ───────────────────────────────────────── */
    textarea {
      flex:1; width:100%; resize:none; min-height:0;
      padding:9px 10px;
      font-family:'SF Mono','Fira Code','Menlo','Consolas',monospace;
      font-size:14px; line-height:1.65; background:var(--inset); color:var(--txt);
      border:1px solid var(--bdr); border-radius:7px;
      outline:none !important; box-shadow:none !important; transition:border-color .18s;
    }
    textarea:focus { border-color:var(--acc); }
    textarea::placeholder { color:var(--muted); opacity:.55; font-style:italic; }
    textarea::-webkit-scrollbar { width:6px; }
    textarea::-webkit-scrollbar-thumb { background:var(--bdr); border-radius:3px; }
    textarea.verify-match { border-color:var(--ok) !important; background:rgba(16,185,129,.05) !important; }
    textarea.verify-fail  { border-color:var(--err) !important; background:rgba(239,68,68,.05) !important; }

    /* ── Controls ────────────────────────────────────────── */
    .ctrl-scroll {
      flex:1; display:flex; flex-direction:column; gap:7px;
      overflow-y:auto; min-height:0; padding-right:2px;
    }
    .ctrl-scroll::-webkit-scrollbar { width:4px; }
    .ctrl-scroll::-webkit-scrollbar-thumb { background:var(--bdr); border-radius:2px; }
    .field { display:flex; flex-direction:column; gap:3px; }
    .field > label { font-size:12px; font-weight:600; color:var(--muted); }

    /* ── Form controls ───────────────────────────────────── */
    input[type="text"], input[type="number"], input[type="password"], select {
      background:var(--inset); color:var(--txt); border:1px solid var(--bdr);
      border-radius:6px; padding:6px 8px; font-size:13px;
      outline:none !important; box-shadow:none !important;
      transition:border-color .18s; width:100%;
      -webkit-appearance:none; appearance:none;
    }
    input:valid, input:invalid, input:-webkit-autofill,
    input:-webkit-autofill:hover, input:-webkit-autofill:focus {
      border-color:var(--bdr) !important; box-shadow:none !important; outline:none !important;
    }
    input:focus, select:focus { border-color:var(--acc); background:var(--bg); }
    .inp-sm { padding:5px 7px !important; font-size:12px !important; }
    .row2 { display:grid; grid-template-columns:1fr 1fr; gap:5px; }

    /* ── Encoding button groups ──────────────────────────── */
    .enc-group { display:flex; flex-direction:column; gap:4px; }
    .enc-group-label {
      font-size:10px; font-weight:700; color:var(--muted);
      letter-spacing:.06em; text-transform:uppercase; padding-left:1px;
    }
    .enc-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:4px; }
    .enc-btn {
      padding:5px 3px; border:1px solid var(--bdr); border-radius:6px;
      background:var(--inset); color:var(--muted); font-size:11px; font-weight:600;
      cursor:pointer; text-align:center; transition:all .15s; white-space:nowrap;
      overflow:hidden; text-overflow:ellipsis;
    }
    .enc-btn:hover { background:var(--inset2); color:var(--txt); border-color:var(--muted); }
    .enc-btn.active { background:var(--acc); color:#fff; border-color:var(--acc); }

    /* ── Info bar ────────────────────────────────────────── */
    .info-bar {
      display:flex; align-items:center; justify-content:space-between; gap:8px;
      background:var(--inset); border:1px solid var(--bdr);
      border-radius:6px; padding:4px 9px; font-size:11px; color:var(--muted);
      flex-shrink:0;
    }
    .info-bar span:first-child { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .badge {
      font-size:10px; font-weight:700; padding:2px 7px; border-radius:4px;
      letter-spacing:.04em; background:var(--inset2); color:var(--muted); flex-shrink:0;
    }
    .badge-ok   { background:rgba(16,185,129,.15); color:#10b981; }
    .badge-err  { background:rgba(239,68,68,.15);  color:var(--err); }
    .badge-inf  { background:rgba(59,130,246,.15);  color:#3b82f6; }
    .badge-warn { background:rgba(245,158,11,.15);  color:var(--warn); }



    /* ── Buttons ─────────────────────────────────────────── */
    .btn {
      border:none; border-radius:6px; font-weight:400; cursor:pointer;
      display:inline-flex; align-items:center; justify-content:center; gap:5px;
      transition:all .16s; white-space:nowrap; flex-shrink:0; font-size:12px;
    }
    .btn:active { transform:scale(.95); }
    .btn.xs { padding:4px 8px; font-size:12px; }
    .btn.sm { padding:5px 10px; font-size:13px; }
    .btn-ghost { background:var(--inset); color:var(--txt); border:1px solid var(--bdr); }
    .btn-ghost:hover { background:var(--inset2); }

    /* Decode LEFT, Encode RIGHT - arrows show data-flow direction */
    .btn-decode {
      flex:1; padding:9px 12px; font-size:13px; font-weight:700;
      background:linear-gradient(135deg,#3b82f6,#2563eb); color:#fff;
      border:none; border-radius:6px; cursor:pointer;
      display:flex; align-items:center; justify-content:center; gap:6px;
      transition:all .18s;
    }
    .btn-encode {
      flex:1; padding:9px 12px; font-size:13px; font-weight:700;
      background:linear-gradient(135deg,#10b981,#059669); color:#fff;
      border:none; border-radius:6px; cursor:pointer;
      display:flex; align-items:center; justify-content:center; gap:6px;
      transition:all .18s;
    }
    .btn-decode:hover, .btn-encode:hover {
      filter:brightness(1.1); transform:translateY(-1px); box-shadow:0 4px 12px var(--shd);
    }
    .btn-verify {
      width:100%; padding:8px; font-size:12px; font-weight:600;
      background:var(--inset); color:var(--txt);
      border:1px solid var(--bdr); border-radius:6px; cursor:pointer;
      display:flex; align-items:center; justify-content:center; gap:6px;
      transition:all .18s;
    }
    .btn-verify:hover { background:var(--inset2); }

    .swap-btn {
      background:transparent; border:1px solid var(--bdr); color:var(--muted);
      border-radius:6px; padding:4px 8px; cursor:pointer; flex-shrink:0; font-size:13px;
      display:inline-flex; align-items:center; gap:4px; transition:all .18s;
    }
    .swap-btn:hover { color:var(--acc); border-color:var(--acc); }

    .detect-chip {
      display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:600;
      padding:4px 9px; border-radius:20px; cursor:pointer;
      background:var(--inset2); border:1px solid var(--bdr);
      color:var(--muted); transition:all .18s; flex-shrink:0;
    }
    .detect-chip:hover { border-color:var(--acc); color:var(--acc); }

    .act-row { display:flex; gap:7px; }
    .bot-row { display:flex; gap:6px; }
    .divider { height:1px; background:var(--bdr); flex-shrink:0; }
    .spacer  { flex:1; min-height:2px; }

    /* ── Status ──────────────────────────────────────────── */
    .status {
      padding:6px 10px; border-radius:6px; font-size:13px;
      display:none; flex-shrink:0; animation:pop .2s ease;
    }
    .status.success { background:rgba(16,185,129,.12); color:var(--ok);   border:1px solid rgba(16,185,129,.25); }
    .status.error   { background:rgba(239,68,68,.12);  color:var(--err);  border:1px solid rgba(239,68,68,.25); }
    .status.warn    { background:rgba(245,158,11,.12); color:var(--warn); border:1px solid rgba(245,158,11,.25); }
    @keyframes pop { from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)} }

    /* ── Responsive ──────────────────────────────────────── */
    @media (max-width:1100px) {
      .layout { grid-template-columns:1fr; }
      .panel  { height:auto; max-height:none; min-height:240px; }
      textarea { min-height:140px; }
    }
    @media (max-width:540px) {
      .home-link .link-text { display:none; }
      .home-link { padding:5px 8px; gap:4px; }
    }
    @media (max-width:600px) {
      body { padding:6px 8px; } h1 { font-size:16px; }
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="hdr-left">
      <a href="/CyberKitchen" class="home-link" title="Back to CyberKitchen">
        <i class="fa-solid fa-arrow-left"></i>
        <span class="link-text">CyberKitchen</span>
      </a>
    </div>
    <h1>Encoder / Decoder</h1>
    <div class="hdr-right">
      <button class="icon-btn" id="themeBtn" onclick="toggleTheme()" title="Toggle theme">
        <i class="fa-solid fa-moon" id="themeIcon"></i>
      </button>
    </div>
  </header>

  <div class="layout">

    <!-- ══ LEFT: Encoded ════════════════════════════════════ -->
    <div class="panel">
      <div class="panel-hdr"><i class="fa-solid fa-code"></i> ENCODED</div>
      <div class="toolbar">
        <button class="btn btn-ghost xs" onclick="copyText('outputData')"><i class="fa-regular fa-copy"></i><span class="btn-text"> Copy</span></button>
        <button class="btn btn-ghost xs" onclick="clearField('outputData')"><i class="fa-regular fa-trash-can"></i><span class="btn-text"> Clear</span></button>
        <button class="btn btn-ghost xs" onclick="dlText('outputData','encoded.txt')"><i class="fa-solid fa-download"></i><span class="btn-text"> Save</span></button>
        <div class="tb-fill"></div>
        <button class="swap-btn" onclick="swapPanels()">
          <i class="fa-solid fa-right-left"></i><span class="swap-text"> Swap</span>
        </button>
      </div>
      <textarea id="outputData" placeholder="Type or paste data to decode..."></textarea>
    </div>

    <!-- ══ MIDDLE: Configuration ═════════════════════════════ -->
    <div class="panel">
      <div class="panel-hdr"><i class="fa-solid fa-gear"></i> CONFIGURATION</div>
      <div class="ctrl-scroll">

        <!-- Encoding groups - filled by JS -->
        <div id="encGroupsWrap"></div>

        <!-- Selected encoding info -->
        <div class="info-bar">
          <span id="encInfo">-</span>
          <span class="badge badge-inf" id="encBadge">-</span>
        </div>

        <div class="divider"></div>

        <!-- Auto-detect -->
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <span style="font-size:12px;font-weight:600;color:var(--muted)">Auto-Detect</span>
          <button class="detect-chip" onclick="autoDetect()">
            <i class="fa-solid fa-wand-magic-sparkles"></i> Detect
          </button>
        </div>
        <div class="info-bar" id="detectBar" style="display:none">
          <span id="detectMsg">-</span>
          <span class="badge" id="detectBadge">-</span>
        </div>

        <div class="divider"></div>

        <!--
          Button layout (data-flow arrows):
          LEFT = Decode → (encoded RIGHT panel → plain LEFT panel)
          RIGHT = Encode ← (plain LEFT panel → encoded RIGHT panel)
        -->

        <div class="act-row">
          <button class="btn-decode" onclick="doDecode()" title="Decode right → left (Ctrl+D)">
            <i class="fa-solid fa-unlock"></i> Decode
            <i class="fa-solid fa-arrow-right" style="font-size:11px"></i>
          </button>
          <button class="btn-encode" onclick="doEncode()" title="Encode left → right (Ctrl+E)">
            <i class="fa-solid fa-arrow-left" style="font-size:11px"></i> Encode
            <i class="fa-solid fa-lock"></i>
          </button>
        </div>

        <button class="btn-verify" onclick="doVerify()">
          <i class="fa-solid fa-circle-check"></i> Verify Match
        </button>

        <div id="status" class="status"></div>

        <div class="spacer"></div>
        <div class="divider"></div>

        <div style="font-size:12px;color:var(--muted);text-align:center;line-height:2;font-weight:700">
          Ctrl+E &nbsp;Encode &nbsp;&nbsp; Ctrl+D &nbsp;Decode &nbsp;&nbsp; Ctrl+R &nbsp;Reset
        </div>

        <div class="bot-row">
          <button class="btn btn-ghost sm" style="flex:1" onclick="shareConfig()">
            <i class="fa-solid fa-link"></i> Share URL
          </button>
          <button class="btn btn-ghost sm" style="flex:1" onclick="resetAll()">
            <i class="fa-solid fa-rotate"></i> Reset
          </button>
        </div>

      </div>
    </div>

    <!-- ══ RIGHT: Decoded / Plain ════════════════════════════ -->
    <div class="panel">
      <div class="panel-hdr"><i class="fa-regular fa-file-lines"></i> DECODED / PLAIN</div>
      <div class="toolbar">
        <button class="btn btn-ghost xs" onclick="copyText('inputData')"><i class="fa-regular fa-copy"></i><span class="btn-text"> Copy</span></button>
        <button class="btn btn-ghost xs" onclick="clearField('inputData')"><i class="fa-regular fa-trash-can"></i><span class="btn-text"> Clear</span></button>
        <button class="btn btn-ghost xs" onclick="dlText('inputData','decoded.txt')"><i class="fa-solid fa-download"></i><span class="btn-text"> Save</span></button>
        <div class="tb-fill"></div>
      </div>
      <textarea id="inputData" placeholder="Type or paste data to encode..."></textarea>
    </div>

  </div>
</div>

<script>
'use strict';

/* ══════════════════════════════════════════════════════════════
   ENCODING / CIPHER REGISTRY
══════════════════════════════════════════════════════════════ */
var ENCODINGS = [
  // ── Standard (binary / text encodings used in security & dev) ──
  { id:'base64',       label:'Base64',      group:'Standard', desc:'RFC 4648 Base64',                   badge:'RFC4648',  opts:null },
  { id:'base64url',    label:'Base64 URL',  group:'Standard', desc:'URL-safe Base64 (no +/=)',          badge:'RFC4648',  opts:null },
  { id:'base32',       label:'Base32',      group:'Standard', desc:'Base32 (A-Z 2-7)',                  badge:'RFC4648',  opts:null },
  { id:'base58',       label:'Base58',      group:'Standard', desc:'Base58 (Bitcoin / IPFS / WIF)',     badge:'BTC',      opts:null },
  { id:'base62',       label:'Base62',      group:'Standard', desc:'Base62 (alphanumeric, URL shorteners)', badge:'Base62', opts:null },
  { id:'hex',          label:'Hex',         group:'Standard', desc:'Hexadecimal encoding',              badge:'Base-16',  opts:null },
  { id:'ascii85',      label:'ASCII85',     group:'Standard', desc:'ASCII85 / Base85 (<~ ~> delimiters)', badge:'Base-85', opts:null },
  { id:'uuencode',     label:'UUEncode',    group:'Standard', desc:'Unix-to-Unix encoding (legacy email/MIME)', badge:'UU', opts:null },

  // ── Web ──────────────────────────────────────────────────
  { id:'url',          label:'URL',         group:'Web',      desc:'URL percent-encoding (RFC 3986)',   badge:'RFC3986',  opts:null },
  { id:'urlall',       label:'URL Full',    group:'Web',      desc:'Full URL encoding (all non-unreserved chars)', badge:'RFC3986', opts:null },
  { id:'html',         label:'HTML',        group:'Web',      desc:'HTML entity encoding (&amp; &lt; &gt;)', badge:'HTML5', opts:null },
  { id:'htmlfull',     label:'HTML Full',   group:'Web',      desc:'HTML numeric entities for every character', badge:'HTML5', opts:null },
  { id:'unicode',      label:'Unicode',     group:'Web',      desc:'JavaScript \\uXXXX Unicode escapes', badge:'ES6',    opts:null },
  { id:'jsesc',        label:'JS Escape',   group:'Web',      desc:'JavaScript string escape (\\n \\t \\r …)', badge:'ES6', opts:null },
  { id:'cssesc',       label:'CSS Escape',  group:'Web',      desc:'CSS unicode escape (\\XXXXXX)',     badge:'CSS3',     opts:null },
  { id:'xmlesc',       label:'XML',         group:'Web',      desc:'XML/SGML entity escaping',          badge:'XML1.0',   opts:null },
  { id:'jwt',          label:'JWT',         group:'Web',      desc:'JWT decode (shows header + payload)', badge:'RFC7519', opts:null },


];

var _current = 'base64';

/* ─── DOM helpers ─────────────────────────────────────────── */
var $ = function(id){ return document.getElementById(id); };
function gv(id){ return $(id).value; }
function sv(id,v){ $(id).value = v; }
var ENC = new TextEncoder(), DEC_UTF8 = new TextDecoder();

function strToBytes(s){ return ENC.encode(s); }
function bytesToStr(b){ return DEC_UTF8.decode(b instanceof Uint8Array ? b : new Uint8Array(b)); }
function hexToBytes(h){ h=h.replace(/[\s]/g,''); var b=new Uint8Array(h.length/2); for(var i=0;i<b.length;i++) b[i]=parseInt(h.slice(i*2,i*2+2),16); return b; }
function bytesToHex(b){ return Array.from(b instanceof Uint8Array?b:new Uint8Array(b),function(x){ return x.toString(16).padStart(2,'0'); }).join(''); }

/* ─── Build encoding grids ────────────────────────────────── */
function buildGrid() {
  var wrap = $('encGroupsWrap');
  wrap.innerHTML = '';
  var groups = {}, order = [];
  ENCODINGS.forEach(function(e) {
    if (!groups[e.group]) { groups[e.group]=[]; order.push(e.group); }
    groups[e.group].push(e);
  });
  order.forEach(function(grp) {
    var lbl = document.createElement('div');
    lbl.className = 'enc-group-label';
    lbl.textContent = grp;
    wrap.appendChild(lbl);
    var g = document.createElement('div');
    g.className = 'enc-grid';
    groups[grp].forEach(function(enc) {
      var btn = document.createElement('button');
      btn.id = 'enc_' + enc.id;
      btn.className = 'enc-btn' + (enc.id === _current ? ' active' : '');
      btn.textContent = enc.label;
      btn.title = enc.desc;
      btn.onclick = (function(id){ return function(){ selectEnc(id); }; })(enc.id);
      g.appendChild(btn);
    });
    wrap.appendChild(g);
  });
  updateEncInfo();
}

function selectEnc(id) {
  _current = id;
  ENCODINGS.forEach(function(e) {
    var b = $('enc_' + e.id);
    if (b) b.className = 'enc-btn' + (e.id === id ? ' active' : '');
  });
  $('outputData').classList.remove('verify-match','verify-fail');
  updateEncInfo();
}

function getEnc(id){ return ENCODINGS.find(function(e){ return e.id===id; })||null; }

function updateEncInfo() {
  var e = getEnc(_current);
  if (!e) return;
  $('encInfo').textContent = e.desc;
  $('encBadge').textContent = e.badge;
}

/* ══════════════════════════════════════════════════════════════
   IMPLEMENTATIONS
══════════════════════════════════════════════════════════════ */

/* ── Base32 ──────────────────────────────────────────────── */
var B32='ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
function base32Encode(bytes){
  var r='',buf=0,bits=0;
  for(var i=0;i<bytes.length;i++){buf=(buf<<8)|bytes[i];bits+=8;while(bits>=5){r+=B32[(buf>>(bits-5))&31];bits-=5;}}
  if(bits){r+=B32[(buf<<(5-bits))&31];}
  while(r.length%8)r+='=';
  return r;
}
function base32Decode(s){
  s=s.toUpperCase().replace(/=+$/,'');
  var r=[],buf=0,bits=0;
  for(var i=0;i<s.length;i++){var v=B32.indexOf(s[i]);if(v<0)continue;buf=(buf<<5)|v;bits+=5;if(bits>=8){r.push((buf>>(bits-8))&0xff);bits-=8;}}
  return new Uint8Array(r);
}

/* ── Base58 (Bitcoin alphabet) ───────────────────────────── */
var B58='123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz';
function base58Encode(bytes){
  var digits=[0];
  for(var i=0;i<bytes.length;i++){
    var carry=bytes[i];
    for(var j=0;j<digits.length;j++){carry+=digits[j]<<8;digits[j]=carry%58;carry=Math.floor(carry/58);}
    while(carry){digits.push(carry%58);carry=Math.floor(carry/58);}
  }
  var r='';
  for(var i=0;i<bytes.length&&!bytes[i];i++)r+=B58[0];
  for(var i=digits.length-1;i>=0;i--)r+=B58[digits[i]];
  return r;
}
function base58Decode(s){
  var bytes=[0];
  for(var i=0;i<s.length;i++){
    var v=B58.indexOf(s[i]);if(v<0)throw new Error('Invalid Base58 character: '+s[i]);
    var carry=v;
    for(var j=0;j<bytes.length;j++){carry+=bytes[j]*58;bytes[j]=carry&0xff;carry>>=8;}
    while(carry){bytes.push(carry&0xff);carry>>=8;}
  }
  for(var i=0;i<s.length&&s[i]===B58[0];i++)bytes.push(0);
  return new Uint8Array(bytes.reverse());
}

/* ── Base62 ──────────────────────────────────────────────── */
var B62='0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz';
function base62Encode(bytes){
  var n=BigInt('0x'+bytesToHex(bytes)||'0');
  if(n===BigInt(0))return '0';
  var r='';
  while(n>BigInt(0)){r=B62[Number(n%BigInt(62))]+r;n=n/BigInt(62);}
  return r;
}
function base62Decode(s){
  var n=BigInt(0);
  for(var i=0;i<s.length;i++){var v=B62.indexOf(s[i]);if(v<0)throw new Error('Invalid Base62 char');n=n*BigInt(62)+BigInt(v);}
  var h=n.toString(16); if(h.length%2)h='0'+h;
  return hexToBytes(h);
}

/* ── ASCII85 ─────────────────────────────────────────────── */
function ascii85Encode(bytes){
  var r='<~';
  for(var i=0;i<bytes.length;i+=4){
    var need=Math.min(4,bytes.length-i);
    var v=0; for(var j=0;j<4;j++) v=v*256+((j<need)?bytes[i+j]:0);
    if(v===0&&need===4){r+='z';}
    else{
      var c=[]; for(var j=4;j>=0;j--){c[j]=v%85+33;v=Math.floor(v/85);}
      r+=String.fromCharCode.apply(null,c.slice(0,need+1));
    }
  }
  return r+'~>';
}
function ascii85Decode(s){
  s=s.replace(/^<~/,'').replace(/~>$/,'').replace(/\s/g,'');
  var out=[];
  for(var i=0;i<s.length;){
    var chunk=s[i]==='z'?(i++,'zzzzz'):'';
    if(!chunk){for(var j=0;j<5&&i<s.length;j++,i++)chunk+=s[i];}
    while(chunk.length<5)chunk+='u';
    var v=0; for(var j=0;j<5;j++) v=v*85+(chunk.charCodeAt(j)-33);
    var bytes=4; if(s[i-1]&&chunk.slice(-(5-bytes))==='uuuu'.slice(0,5-bytes))bytes=chunk.length-1;
    for(var j=3;j>=0&&j>=4-bytes;j--) out.push((v>>(j*8))&0xff);
  }
  return new Uint8Array(out);
}

/* ── UUEncode ────────────────────────────────────────────── */
function uuEncode(bytes){
  var lines=['begin 644 encoded'],i=0;
  while(i<bytes.length){
    var chunk=bytes.slice(i,i+45); i+=45;
    var len=chunk.length;
    var line=String.fromCharCode(len+32);
    for(var j=0;j<len;j+=3){
      var b0=chunk[j]||0,b1=chunk[j+1]||0,b2=chunk[j+2]||0;
      line+=String.fromCharCode(((b0>>2)&63)+32,((((b0<<4)|(b1>>4))&63))+32,((((b1<<2)|(b2>>6))&63))+32,((b2&63)+32));
    }
    lines.push(line);
  }
  lines.push('`\nend'); return lines.join('\n');
}
function uuDecode(s){
  var out=[],lines=s.split('\n');
  lines.forEach(function(line){
    if(!line||line.startsWith('begin')||line.startsWith('end')||line==='`')return;
    var len=(line.charCodeAt(0)-32)&63,i=1;
    for(var j=0;j<len;){
      var a=(line.charCodeAt(i++)-32)&63,b=(line.charCodeAt(i++)-32)&63,c=(line.charCodeAt(i++)-32)&63,d=(line.charCodeAt(i++)-32)&63;
      if(j++<len)out.push((a<<2)|(b>>4));
      if(j++<len)out.push(((b&15)<<4)|(c>>2));
      if(j++<len)out.push(((c&3)<<6)|d);
    }
  });
  return new Uint8Array(out);
}

/* ── Web encodings ────────────────────────────────────────── */
function htmlEncode(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#x27;');}
function htmlDecode(s){var d=document.createElement('div');d.innerHTML=s;return d.textContent||d.innerText||'';}
function htmlFullEncode(s){var r='';for(var i=0;i<s.length;){var c=s.codePointAt(i);r+='&#'+c+';';i+=(c>0xFFFF?2:1);}return r;}
function unicodeEncode(s){var r='';for(var i=0;i<s.length;i++){r+='\\u'+s.charCodeAt(i).toString(16).toUpperCase().padStart(4,'0');}return r;}
function unicodeDecode(s){return s.replace(/\\u([0-9a-fA-F]{4})/g,function(_,h){return String.fromCharCode(parseInt(h,16));});}
function cssEscEncode(s){var r='';for(var i=0;i<s.length;i++){var c=s.codePointAt(i);if(c>127||c<32)r+='\\'+c.toString(16).toUpperCase().padStart(6,'0')+' ';else r+=s[i];if(c>0xFFFF)i++;}return r;}
function cssEscDecode(s){return s.replace(/\\([0-9a-fA-F]{1,6})\s?/g,function(_,h){return String.fromCodePoint(parseInt(h,16));});}
function xmlEncode(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&apos;');}
function xmlDecode(s){return s.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&apos;/g,"'").replace(/&#x([0-9a-fA-F]+);/gi,function(_,h){return String.fromCodePoint(parseInt(h,16));}).replace(/&#(\d+);/g,function(_,n){return String.fromCodePoint(parseInt(n));});}
function jwtDecode(s){
  var p=s.trim().split('.');
  if(p.length<2)throw new Error('Not a valid JWT');
  function dp(x){x=x.replace(/-/g,'+').replace(/_/g,'/');while(x.length%4)x+='=';try{return JSON.stringify(JSON.parse(atob(x)),null,2);}catch(e){return atob(x);}}
  return 'Header:\n'+dp(p[0])+'\n\nPayload:\n'+dp(p[1])+(p[2]?'\n\nSignature:\n'+p[2]:'');
}
function jwtEncode(s){
  var h=function(o){return btoa(JSON.stringify(o)).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');};
  var hdr=h({alg:'none',typ:'JWT'});
  try{return hdr+'.'+h(JSON.parse(s))+'.';}
  catch(e){return hdr+'.'+btoa(unescape(encodeURIComponent(s))).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_')+'.';}
}


/* ══════════════════════════════════════════════════════════════
   DISPATCH TABLES
══════════════════════════════════════════════════════════════ */
var ENCODE_FN = {
  base64:    function(s){var b='';strToBytes(s).forEach(function(x){b+=String.fromCharCode(x);});return btoa(b);},
  base64url: function(s){var b='';strToBytes(s).forEach(function(x){b+=String.fromCharCode(x);});return btoa(b).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');},
  base32:    function(s){return base32Encode(strToBytes(s));},
  base58:    function(s){return base58Encode(strToBytes(s));},
  base62:    function(s){return base62Encode(strToBytes(s));},
  hex:       function(s){return bytesToHex(strToBytes(s));},
  ascii85:   function(s){return ascii85Encode(strToBytes(s));},
  uuencode:  function(s){return uuEncode(strToBytes(s));},
  url:       function(s){return encodeURIComponent(s);},
  urlall:    function(s){return encodeURIComponent(s).replace(/[!'()*]/g,function(c){return '%'+c.charCodeAt(0).toString(16).toUpperCase();});},
  html:      function(s){return htmlEncode(s);},
  htmlfull:  function(s){return htmlFullEncode(s);},
  unicode:   function(s){return unicodeEncode(s);},
  jsesc:     function(s){return JSON.stringify(s).slice(1,-1);},
  cssesc:    function(s){return cssEscEncode(s);},
  xmlesc:    function(s){return xmlEncode(s);},
  jwt:       function(s){return jwtEncode(s);},

};

var DECODE_FN = {
  base64:    function(s){var bin=atob(s.replace(/\s/g,''));var b=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)b[i]=bin.charCodeAt(i);return bytesToStr(b);},
  base64url: function(s){var p=s.trim().replace(/-/g,'+').replace(/_/g,'/');while(p.length%4)p+='=';var bin=atob(p);var b=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)b[i]=bin.charCodeAt(i);return bytesToStr(b);},
  base32:    function(s){return bytesToStr(base32Decode(s));},
  base58:    function(s){return bytesToStr(base58Decode(s.trim()));},
  base62:    function(s){return bytesToStr(base62Decode(s.trim()));},
  hex:       function(s){return bytesToStr(hexToBytes(s.replace(/\s/g,'')));},
  ascii85:   function(s){return bytesToStr(ascii85Decode(s));},
  uuencode:  function(s){return bytesToStr(uuDecode(s));},
  url:       function(s){return decodeURIComponent(s);},
  urlall:    function(s){return decodeURIComponent(s);},
  html:      function(s){return htmlDecode(s);},
  htmlfull:  function(s){return htmlDecode(s);},
  unicode:   function(s){return unicodeDecode(s);},
  jsesc:     function(s){try{return JSON.parse('"'+s.replace(/"/g,'\\"')+'"');}catch(e){return s;}},
  cssesc:    function(s){return cssEscDecode(s);},
  xmlesc:    function(s){return xmlDecode(s);},
  jwt:       function(s){return jwtDecode(s);},

};

/* ─── Actions ─────────────────────────────────────────────── */
function doEncode(){
  try {
    var input=gv('inputData');
    if(!input)throw new Error('Decoded panel is empty');
    var fn=ENCODE_FN[_current];
    if(!fn)throw new Error('No encoder for '+_current);
    sv('outputData',fn(input));
    $('outputData').classList.remove('verify-match','verify-fail');
    showStatus(getEnc(_current).label+' encoded','success');
  } catch(e){showStatus(e.message,'error');console.error(e);}
}

function doDecode(){
  try {
    var input=gv('outputData');
    if(!input)throw new Error('Encoded panel is empty');
    var fn=DECODE_FN[_current];
    if(!fn)throw new Error('No decoder for '+_current);
    sv('inputData',fn(input));
    $('outputData').classList.remove('verify-match','verify-fail');
    showStatus(getEnc(_current).label+' decoded','success');
  } catch(e){showStatus(e.message,'error');console.error(e);}
}

function doVerify(){
  try {
    var left=gv('inputData').trim(), right=gv('outputData').trim();
    if(!left||!right)throw new Error('Both panels must have content');
    var fn=ENCODE_FN[_current];
    if(!fn)throw new Error('No encoder available');
    var encoded=fn(left).trim();
    var match=(encoded===right)||(encoded.toLowerCase()===right.toLowerCase());
    if(!match){try{var decoded=DECODE_FN[_current](right).trim();match=(decoded===left);}catch(e){}}
    $('outputData').classList.remove('verify-match','verify-fail');
    $('outputData').classList.add(match?'verify-match':'verify-fail');
    showStatus(match?'Match - both panels are equivalent':'No match - content does not correspond',match?'success':'error');
  }catch(e){showStatus(e.message,'error');}
}

function swapPanels(){
  var a=gv('inputData'),b=gv('outputData');
  sv('inputData',b);sv('outputData',a);
  $('outputData').classList.remove('verify-match','verify-fail');
  showStatus('Panels swapped','success');
}

/* ─── Auto-detect ─────────────────────────────────────────── */
function autoDetect(){
  var s=gv('outputData').trim()||gv('inputData').trim();
  if(!s){showStatus('Enter data in either panel first','warn');return;}
  var bar=$('detectBar'),msg=$('detectMsg'),bdg=$('detectBadge');
  bar.style.display='flex';
  var detected=detectEncoding(s);
  if(detected){
    msg.textContent=detected.label+' - '+detected.desc;
    bdg.className='badge badge-ok';bdg.textContent='Detected';
    selectEnc(detected.id);buildGrid();
    showStatus('Detected: '+detected.label,'success');
  } else {
    msg.textContent='Could not confidently detect encoding';
    bdg.className='badge badge-warn';bdg.textContent='Unknown';
    showStatus('Encoding not detected','warn');
  }
}

function detectEncoding(s){
  var c=s.trim();
  // JWT: header.payload.signature
  if(/^[A-Za-z0-9\-_]+\.[A-Za-z0-9\-_]+\.[A-Za-z0-9\-_]*$/.test(c)) return getEnc('jwt');
  // UUEncoded
  if(c.startsWith('begin ')&&c.includes('end')) return getEnc('uuencode');
  // ASCII85
  if(c.startsWith('<~')&&c.endsWith('~>')) return getEnc('ascii85');
  // Hex (only 0-9 a-f, even length)
  if(/^[0-9a-fA-F\s]+$/.test(c)&&c.replace(/\s/g,'').length%2===0&&c.replace(/\s/g,'').length>=2) return getEnc('hex');
  // URL encoded
  if(/%[0-9a-fA-F]{2}/.test(c)) return getEnc('url');
  // HTML entities
  if(/&[a-z]+;|&#[0-9]+;|&#x[0-9a-f]+;/i.test(c)) return getEnc('html');
  // Unicode escape
  if(/\\u[0-9a-fA-F]{4}/.test(c)) return getEnc('unicode');
  // CSS escape
  if(/\\[0-9a-fA-F]{1,6}\s/.test(c)) return getEnc('cssesc');
  // Base64 URL-safe (contains - or _)
  if(/^[A-Za-z0-9\-_]+$/.test(c)&&(c.includes('-')||c.includes('_'))&&c.length>=4) return getEnc('base64url');
  // Base64 standard
  if(/^[A-Za-z0-9+/]+=*$/.test(c)&&c.length%4===0&&c.length>=4){try{atob(c);return getEnc('base64');}catch(e){}}
  // Base32
  if(/^[A-Z2-7]+=*$/i.test(c)&&c.length%8===0&&c.length>=8) return getEnc('base32');
  // Base58 (no 0OlI chars)
  if(/^[1-9A-HJ-NP-Za-km-z]+$/.test(c)&&c.length>=6) return getEnc('base58');
  // Base62
  if(/^[0-9A-Za-z]+$/.test(c)&&c.length>=8) return getEnc('base62');
  return null;
}

/* ─── Clipboard / download ────────────────────────────────── */
function copyText(id){
  var v=gv(id);if(!v){showStatus('Nothing to copy','warn');return;}
  var ok=function(){showStatus('Copied to clipboard','success');};
  var fail=function(){try{$(id).select();document.execCommand('copy');ok();}catch(e){showStatus('Copy failed','error');}};
  (navigator.clipboard&&navigator.clipboard.writeText?navigator.clipboard.writeText(v):Promise.reject()).then(ok).catch(fail);
}
function clearField(id){sv(id,'');if(id==='outputData')$('outputData').classList.remove('verify-match','verify-fail');showStatus('Cleared','success');}
function dlText(id,name){
  var v=gv(id);if(!v){showStatus('Nothing to save','warn');return;}
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([v],{type:'text/plain'}));
  a.download=name;a.click();URL.revokeObjectURL(a.href);
  showStatus('Download started','success');
}

/* ─── Status ──────────────────────────────────────────────── */
var _st;
function showStatus(msg,type){
  type=type||'success';var s=$('status');
  s.textContent=msg;s.className='status '+type;s.style.display='block';
  clearTimeout(_st);_st=setTimeout(function(){s.style.display='none';},4000);
}

/* ─── Share URL ───────────────────────────────────────────── */
function b64uEnc(str){var b=new TextEncoder().encode(str),s='';b.forEach(function(x){s+=String.fromCharCode(x);});return btoa(s).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');}
function b64uDec(str){str=str.replace(/-/g,'+').replace(/_/g,'/');while(str.length%4)str+='=';var b=atob(str),arr=new Uint8Array(b.length);for(var i=0;i<b.length;i++)arr[i]=b.charCodeAt(i);return new TextDecoder().decode(arr);}

function shareConfig(){
  var state={v:2,enc:_current,input:gv('inputData'),output:gv('outputData')};
  try{
    var url=window.location.href.split('#')[0]+'#s='+b64uEnc(JSON.stringify(state));
    var ok=function(){showStatus('Share URL copied to clipboard','success');};
    (navigator.clipboard&&navigator.clipboard.writeText?navigator.clipboard.writeText(url):Promise.reject()).then(ok).catch(function(){try{var ta=document.createElement('textarea');ta.value=url;ta.style.cssText='position:fixed;top:-9999px;opacity:0';document.body.appendChild(ta);ta.focus();ta.select();document.execCommand('copy');ok();document.body.removeChild(ta);}catch(e){prompt('Copy URL:',url);}});
  }catch(e){showStatus('Could not generate URL','error');}
}
function loadFromHash(){
  var hash=window.location.hash;
  if(!hash||hash.indexOf('s=')===-1)return;
  try{
    var enc=new URLSearchParams(hash.slice(1)).get('s');
    if(!enc)return;
    var st=JSON.parse(b64uDec(enc));
    if(st.enc)_current=st.enc;
    if(st.input!==undefined)sv('inputData',st.input);
    if(st.output!==undefined)sv('outputData',st.output);
    buildGrid();selectEnc(_current);
    showStatus('Configuration loaded from URL','success');
  }catch(e){console.warn('loadFromHash:',e);}
}

/* ─── Reset ───────────────────────────────────────────────── */
function resetAll(){
  if(!confirm('Reset all fields?'))return;
  sv('inputData','');sv('outputData','');
  $('outputData').classList.remove('verify-match','verify-fail');
  $('detectBar').style.display='none';

  _current='base64';
  try{history.replaceState(null,'',location.pathname+location.search);}catch(e){}
  buildGrid();selectEnc('base64');
  showStatus('Reset complete','success');
}

/* ─── Theme ───────────────────────────────────────────────── */
function toggleTheme(){var n=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',n);localStorage.setItem('enc-theme',n);$('themeIcon').className=n==='dark'?'fa-solid fa-sun':'fa-solid fa-moon';}
function loadTheme(){var t=localStorage.getItem('enc-theme')||'light';document.documentElement.setAttribute('data-theme',t);$('themeIcon').className=t==='dark'?'fa-solid fa-sun':'fa-solid fa-moon';}

/* ─── Keyboard shortcuts ──────────────────────────────────── */
document.addEventListener('keydown',function(e){
  if(!(e.ctrlKey||e.metaKey))return;
  if(e.key.toLowerCase()==='e'){e.preventDefault();doEncode();}
  if(e.key.toLowerCase()==='d'){e.preventDefault();doDecode();}
  if(e.key.toLowerCase()==='r'){e.preventDefault();resetAll();}
});

/* ─── Init ────────────────────────────────────────────────── */
loadTheme();
loadFromHash();
buildGrid();
selectEnc(_current);
