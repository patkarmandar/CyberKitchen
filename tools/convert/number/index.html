<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Number Converter - CyberKitchen</title>
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    onerror="this.onerror=null;this.href='https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css'">
  <style>
    :root {
      --bg:#f8fafc; --surf:#ffffff; --inset:#f1f5f9; --inset2:#e4eaf1;
      --txt:#0f172a; --muted:#64748b; --acc:#3b82f6; --ok:#10b981;
      --err:#ef4444; --warn:#f59e0b; --bdr:#e2e8f0; --shd:rgba(0,0,0,.07);
    }
    [data-theme="dark"] {
      --bg:#0d1117; --surf:#161b22; --inset:#21262d; --inset2:#2d333b;
      --txt:#e6edf3; --muted:#8b949e; --bdr:#30363d; --shd:rgba(0,0,0,.4);
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    html{overflow-x:hidden;}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      font-size:14.5px;background:var(--bg);color:var(--txt);
      padding:10px 14px;line-height:1.5;
      transition:background .25s,color .25s;overflow-x:hidden;
    }
    .container{max-width:1800px;margin:0 auto;}
    header{
      display:grid;grid-template-columns:1fr auto 1fr;
      align-items:center;margin-bottom:10px;min-height:38px;
    }
    .hdr-left{display:flex;align-items:center;justify-content:flex-start;min-width:0;}
    .hdr-right{display:flex;align-items:center;justify-content:flex-end;gap:6px;min-width:0;}
    h1{
      text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 8px;
      font-size:22px;font-weight:800;letter-spacing:-.3px;
      background:linear-gradient(130deg,#06b6d4 0%,#3b82f6 50%,#8b5cf6 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }
    .home-link{
      display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;
      color:var(--muted);text-decoration:none;padding:5px 10px;
      border:1px solid var(--bdr);border-radius:7px;background:var(--surf);
      transition:all .18s;white-space:nowrap;
    }
    .home-link:hover{color:var(--acc);border-color:var(--acc);background:var(--inset);}
    .home-link i{font-size:12px;flex-shrink:0;}
    .icon-btn{
      width:34px;height:34px;border-radius:8px;background:var(--surf);
      border:1px solid var(--bdr);cursor:pointer;display:flex;align-items:center;
      justify-content:center;color:var(--muted);font-size:14px;transition:all .2s;
    }
    .icon-btn:hover{border-color:var(--acc);color:var(--acc);transform:scale(1.08);}
    .layout{display:grid;grid-template-columns:1fr 340px 1fr;gap:10px;}
    .panel{
      background:var(--surf);border:1px solid var(--bdr);border-radius:10px;
      padding:12px;box-shadow:0 1px 4px var(--shd);
      display:flex;flex-direction:column;gap:8px;
      height:calc(100vh - 70px);min-height:480px;max-height:840px;
    }
    .panel-hdr{
      font-size:13px;font-weight:700;letter-spacing:.03em;
      color:var(--txt);display:flex;align-items:center;gap:6px;flex-shrink:0;
    }
    .panel-hdr i{font-size:13px;color:var(--muted);}
    .toolbar{display:flex;align-items:center;gap:5px;flex-wrap:nowrap;flex-shrink:0;}
    .tb-fill{flex:1;min-width:0;}
    .tb-sep{width:1px;height:14px;background:var(--bdr);flex-shrink:0;margin:0 2px;}
    @media(max-width:600px){
      .toolbar{gap:4px;}
      .toolbar .btn-text{display:none;}
      .swap-btn .swap-text{display:none;}
      .swap-btn{padding:4px 7px;}
      .tb-sep{display:none;}
      .btn.xs{padding:4px 7px;}
    }
    textarea{
      flex:1;width:100%;resize:none;min-height:0;
      padding:9px 10px;
      font-family:'SF Mono','Fira Code','Menlo','Consolas',monospace;
      font-size:14px;line-height:1.8;background:var(--inset);color:var(--txt);
      border:1px solid var(--bdr);border-radius:7px;
      outline:none!important;box-shadow:none!important;transition:border-color .18s;
    }
    textarea:focus{border-color:var(--acc);}
    textarea::placeholder{color:var(--muted);opacity:.55;font-style:italic;}
    textarea::-webkit-scrollbar{width:6px;}
    textarea::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px;}
    textarea.ok{border-color:var(--ok)!important;background:rgba(16,185,129,.05)!important;}
    textarea.fail{border-color:var(--err)!important;background:rgba(239,68,68,.05)!important;}
    /* All-conversions panel */
    .all-wrap{
      flex:1;display:none;flex-direction:column;gap:5px;
      overflow-y:auto;min-height:0;
    }
    .all-wrap::-webkit-scrollbar{width:5px;}
    .all-wrap::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px;}
    .all-row{
      display:grid;grid-template-columns:100px 1fr auto;
      gap:6px;align-items:center;
      background:var(--inset);border:1px solid var(--bdr);
      border-radius:6px;padding:5px 9px;
    }
    .all-lbl{font-size:11px;font-weight:700;color:var(--muted);white-space:nowrap;}
    .all-val{font-family:'SF Mono','Fira Code',monospace;font-size:12px;color:var(--txt);word-break:break-all;overflow:hidden;}
    .all-cp{border:1px solid var(--bdr);background:var(--inset2);border-radius:4px;padding:2px 6px;font-size:10px;cursor:pointer;color:var(--muted);flex-shrink:0;transition:all .15s;}
    .all-cp:hover{color:var(--acc);border-color:var(--acc);}
    .all-sec{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;flex-shrink:0;padding-left:1px;}
    /* Controls */
    .ctrl-scroll{
      flex:1;display:flex;flex-direction:column;gap:7px;
      overflow-y:auto;min-height:0;padding-right:2px;
    }
    .ctrl-scroll::-webkit-scrollbar{width:4px;}
    .ctrl-scroll::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px;}
    .field{display:flex;flex-direction:column;gap:3px;}
    .field>label{font-size:12px;font-weight:600;color:var(--muted);}
    input[type="text"],input[type="number"],select{
      background:var(--inset);color:var(--txt);border:1px solid var(--bdr);
      border-radius:6px;padding:6px 8px;font-size:13px;
      outline:none!important;box-shadow:none!important;
      transition:border-color .18s;width:100%;
      -webkit-appearance:none;appearance:none;
    }
    input:valid,input:invalid,input:-webkit-autofill,
    input:-webkit-autofill:hover,input:-webkit-autofill:focus{
      border-color:var(--bdr)!important;box-shadow:none!important;outline:none!important;
    }
    input:focus,select:focus{border-color:var(--acc);background:var(--bg);}
    .inp-sm{padding:5px 7px!important;font-size:12px!important;}
    /* Base buttons */
    .grp-label{
      font-size:10px;font-weight:700;color:var(--muted);
      letter-spacing:.06em;text-transform:uppercase;padding-left:1px;margin-top:2px;
    }
    .base-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;}
    .base-btn{
      padding:5px 3px;border:1px solid var(--bdr);border-radius:6px;
      background:var(--inset);color:var(--muted);font-size:11px;font-weight:600;
      cursor:pointer;text-align:center;transition:all .15s;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .base-btn:hover{background:var(--inset2);color:var(--txt);border-color:var(--muted);}
    .base-btn.af{background:var(--acc);color:#fff;border-color:var(--acc);}
    .base-btn.at{background:#8b5cf6;border-color:#8b5cf6;color:#fff;}
    /* Info bar */
    .info-bar{
      display:flex;align-items:center;justify-content:space-between;gap:6px;
      background:var(--inset);border:1px solid var(--bdr);
      border-radius:6px;padding:4px 9px;font-size:11px;color:var(--muted);flex-shrink:0;
    }
    .info-bar span:first-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .badge{
      font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;
      letter-spacing:.04em;background:var(--inset2);color:var(--muted);flex-shrink:0;
    }
    .badge-b{background:rgba(59,130,246,.15);color:#3b82f6;}
    .badge-p{background:rgba(139,92,246,.15);color:#8b5cf6;}
    .badge-g{background:rgba(16,185,129,.15);color:#10b981;}
    /* Direction bar */
    .dir-bar{
      display:flex;align-items:center;justify-content:center;gap:8px;
      background:var(--inset);border:1px solid var(--bdr);
      border-radius:6px;padding:5px 9px;font-size:12px;font-weight:600;flex-shrink:0;
    }
    .dir-f{color:var(--acc);}
    .dir-t{color:#8b5cf6;}
    /* Options */
    .xopts{display:none;flex-direction:column;gap:5px;flex-shrink:0;}
    .xopts.on{display:flex;}
    .bw-row{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;}
    /* Buttons */
    .btn{
      border:none;border-radius:6px;font-weight:400;cursor:pointer;
      display:inline-flex;align-items:center;justify-content:center;gap:5px;
      transition:all .16s;white-space:nowrap;flex-shrink:0;font-size:12px;
    }
    .btn:active{transform:scale(.95);}
    .btn.xs{padding:4px 8px;font-size:12px;}
    .btn.sm{padding:5px 10px;font-size:13px;}
    .btn-ghost{background:var(--inset);color:var(--txt);border:1px solid var(--bdr);}
    .btn-ghost:hover{background:var(--inset2);}
    .btn-conv{
      flex:1;padding:9px 12px;font-size:13px;font-weight:700;
      background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;
      border:none;border-radius:6px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;gap:6px;
      transition:all .18s;
    }
    .btn-rev{
      flex:1;padding:9px 12px;font-size:13px;font-weight:700;
      background:linear-gradient(135deg,#8b5cf6,#7c3aed);color:#fff;
      border:none;border-radius:6px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;gap:6px;
      transition:all .18s;
    }
    .btn-conv:hover,.btn-rev:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 4px 12px var(--shd);}
    .btn-vfy{
      width:100%;padding:8px;font-size:12px;font-weight:600;
      background:var(--inset);color:var(--txt);border:1px solid var(--bdr);
      border-radius:6px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;gap:6px;transition:all .18s;
    }
    .btn-vfy:hover{background:var(--inset2);}
    .swap-btn{
      background:transparent;border:1px solid var(--bdr);color:var(--muted);
      border-radius:6px;padding:4px 8px;cursor:pointer;flex-shrink:0;font-size:13px;
      display:inline-flex;align-items:center;gap:4px;transition:all .18s;
    }
    .swap-btn:hover{color:var(--acc);border-color:var(--acc);}
    .act-row{display:flex;gap:7px;}
    .bot-row{display:flex;gap:6px;}
    .divider{height:1px;background:var(--bdr);flex-shrink:0;}
    .spacer{flex:1;min-height:2px;}
    .status{
      padding:6px 10px;border-radius:6px;font-size:13px;
      display:none;flex-shrink:0;animation:pop .2s ease;
    }
    .status.success{background:rgba(16,185,129,.12);color:var(--ok);border:1px solid rgba(16,185,129,.25);}
    .status.error  {background:rgba(239,68,68,.12); color:var(--err);border:1px solid rgba(239,68,68,.25);}
    .status.warn   {background:rgba(245,158,11,.12);color:var(--warn);border:1px solid rgba(245,158,11,.25);}
    @keyframes pop{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
    @media(max-width:1100px){
      .layout{grid-template-columns:1fr;}
      .panel{height:auto;max-height:none;min-height:220px;}
      textarea{min-height:130px;}
    }
    @media(max-width:540px){
      .home-link .link-text{display:none;}
      .home-link{padding:5px 8px;gap:4px;}
    }
    @media(max-width:600px){body{padding:6px 8px;}h1{font-size:16px;}}
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="hdr-left">
      <a href="/CyberKitchen" class="home-link" title="Back to CyberKitchen">
        <i class="fa-solid fa-arrow-left"></i>
        <span class="link-text">CyberKitchen</span>
      </a>
    </div>
    <h1>Number Converter</h1>
    <div class="hdr-right">
      <button class="icon-btn" id="themeBtn" onclick="toggleTheme()" title="Toggle theme">
        <i class="fa-solid fa-moon" id="themeIcon"></i>
      </button>
    </div>
  </header>

  <div class="layout">

    <!-- LEFT: Input -->
    <div class="panel">
      <div class="panel-hdr"><i class="fa-solid fa-arrow-right-to-bracket"></i> INPUT</div>
      <div class="toolbar">
        <button class="btn btn-ghost xs" onclick="cpText('iIn')"><i class="fa-regular fa-copy"></i><span class="btn-text"> Copy</span></button>
        <button class="btn btn-ghost xs" onclick="clrField('iIn')"><i class="fa-regular fa-trash-can"></i><span class="btn-text"> Clear</span></button>
        <button class="btn btn-ghost xs" onclick="dlText('iIn','input.txt')"><i class="fa-solid fa-download"></i><span class="btn-text"> Save</span></button>
        <div class="tb-fill"></div>
        <button class="swap-btn" onclick="doSwap()"><i class="fa-solid fa-right-left"></i><span class="swap-text"> Swap</span></button>
      </div>
      <textarea id="iIn" placeholder="Enter a number in the selected FROM base&#10;&#10;Examples:&#10;  Decimal  →  255&#10;  Binary   →  11111111&#10;  Hex      →  FF or 0xFF&#10;  Octal    →  377&#10;  Base58   →  Uf7H"></textarea>
    </div>

    <!-- MIDDLE: Config -->
    <div class="panel">
      <div class="panel-hdr"><i class="fa-solid fa-gear"></i> CONFIGURATION</div>
      <div class="ctrl-scroll">

        <div class="grp-label" style="margin-top:0">FROM <span style="color:var(--acc);font-weight:700">(input base)</span></div>
        <div id="gFrom"></div>

        <div class="grp-label">TO <span style="color:#8b5cf6;font-weight:700">(output base)</span></div>
        <div id="gTo"></div>

        <!-- Direction indicator -->
        <div class="dir-bar">
          <span class="dir-f" id="dF">Decimal</span>
          <i class="fa-solid fa-arrow-right" style="color:var(--muted);font-size:11px"></i>
          <span class="dir-t" id="dT">Binary</span>
        </div>

        <!-- Bit-width (for signed/gray/ieee) -->
        <div class="xopts" id="xBW">
          <div class="field">
            <label>Bit Width</label>
            <div class="bw-row">
              <button class="base-btn af" id="bw8"  onclick="setBW(8)">8-bit</button>
              <button class="base-btn"    id="bw16" onclick="setBW(16)">16-bit</button>
              <button class="base-btn"    id="bw32" onclick="setBW(32)">32-bit</button>
              <button class="base-btn"    id="bw64" onclick="setBW(64)">64-bit</button>
            </div>
          </div>
        </div>

        <!-- Custom base input -->
        <div class="xopts" id="xCust">
          <div class="field">
            <label id="custLbl">Custom base (2–36)</label>
            <input type="number" id="custVal" class="inp-sm" value="36" min="2" max="36">
          </div>
        </div>

        <!-- Info -->
        <div class="info-bar">
          <span id="iInfo">Decimal → Binary</span>
          <span class="badge badge-b" id="iBadge">Base 10→2</span>
        </div>

        <div class="divider"></div>

        <!-- Convert / Reverse -->
        <div class="act-row">
          <button class="btn-conv" onclick="doConvert()" title="Convert input→output (Ctrl+E)">
            <i class="fa-solid fa-arrows-rotate"></i> Convert
            <i class="fa-solid fa-arrow-right" style="font-size:11px"></i>
          </button>
          <button class="btn-rev" onclick="doReverse()" title="Reverse output→input (Ctrl+D)">
            <i class="fa-solid fa-arrow-left" style="font-size:11px"></i>
            <i class="fa-solid fa-rotate-left"></i> Reverse
          </button>
        </div>

        <button class="btn-vfy" onclick="doVerify()">
          <i class="fa-solid fa-circle-check"></i> Verify Equivalence
        </button>

        <div id="status" class="status"></div>
        <div class="spacer"></div>
        <div class="divider"></div>

        <div style="font-size:12px;color:var(--muted);text-align:center;line-height:2;font-weight:700">
          Ctrl+E &nbsp;Convert &nbsp;&nbsp; Ctrl+D &nbsp;Reverse &nbsp;&nbsp; Ctrl+R &nbsp;Reset
        </div>

        <div class="bot-row">
          <button class="btn btn-ghost sm" style="flex:1" onclick="shareURL()"><i class="fa-solid fa-link"></i> Share URL</button>
          <button class="btn btn-ghost sm" style="flex:1" onclick="resetAll()"><i class="fa-solid fa-rotate"></i> Reset</button>
        </div>
      </div>
    </div>

    <!-- RIGHT: Output -->
    <div class="panel">
      <div class="panel-hdr"><i class="fa-solid fa-arrow-right-from-bracket"></i> OUTPUT</div>
      <div class="toolbar" id="oTB">
        <button class="btn btn-ghost xs" onclick="cpText('iOut')"><i class="fa-regular fa-copy"></i><span class="btn-text"> Copy</span></button>
        <button class="btn btn-ghost xs" onclick="clrField('iOut')"><i class="fa-regular fa-trash-can"></i><span class="btn-text"> Clear</span></button>
        <button class="btn btn-ghost xs" onclick="dlText('iOut','output.txt')"><i class="fa-solid fa-download"></i><span class="btn-text"> Save</span></button>
        <div class="tb-fill"></div>
      </div>
      <textarea id="iOut" placeholder="Converted result appears here - or paste a value to reverse-convert"></textarea>
      <div class="all-wrap" id="aWrap"></div>
    </div>

  </div>
</div>

<script>
'use strict';
/* ── Registry ─────────────────────────────────────────────── */
var BASES=[
  // Positional
  {id:'bin',  l:'Binary',     g:'Positional', r:2,  d:'Base-2 (0–1)'},
  {id:'oct',  l:'Octal',      g:'Positional', r:8,  d:'Base-8 (0–7)'},
  {id:'dec',  l:'Decimal',    g:'Positional', r:10, d:'Base-10 (0–9)'},
  {id:'hex',  l:'Hex',        g:'Positional', r:16, d:'Base-16 (0–F)'},
  {id:'b32n', l:'Base32num',  g:'Positional', r:32, d:'Base-32 (0–9 A–V)'},
  {id:'b36',  l:'Base36',     g:'Positional', r:36, d:'Base-36 (0–Z)'},
  {id:'b58',  l:'Base58',     g:'Positional', r:58, d:'Base-58 (Bitcoin)'},
  {id:'b62',  l:'Base62',     g:'Positional', r:62, d:'Base-62 (0–9 A–Z a–z)'},
  {id:'cust', l:'Custom',     g:'Positional', r:0,  d:'Custom base 2–36'},
  // Computer
  {id:'twos',   l:"Two's Comp",  g:'Computer', r:0, d:"Two's complement signed binary"},
  {id:'ones',   l:"One's Comp",  g:'Computer', r:0, d:"One's complement signed binary"},
  {id:'smag',   l:'Sign-Mag',    g:'Computer', r:0, d:'Sign-magnitude binary'},
  {id:'bcd',    l:'BCD',         g:'Computer', r:0, d:'Binary Coded Decimal (4 bits/digit)'},
  {id:'gray',   l:'Gray Code',   g:'Computer', r:0, d:'Gray code (reflected binary)'},
  {id:'excess', l:'Excess-N',    g:'Computer', r:0, d:'Biased/Excess-N (bias=2^(bw-1)-1)'},
  {id:'ieee32', l:'IEEE 754-32', g:'Computer', r:0, d:'Single-precision float (32-bit)'},
  {id:'ieee64', l:'IEEE 754-64', g:'Computer', r:0, d:'Double-precision float (64-bit)'},
  // Formatted
  {id:'sci',    l:'Scientific',  g:'Formatted', r:0, d:'Scientific notation (1.5×10^3)'},
  {id:'eng',    l:'Engineering', g:'Formatted', r:0, d:'Engineering notation (SI, exp multiples of 3)'},
  {id:'hex0x',  l:'Hex 0x',      g:'Formatted', r:16,d:'Hex with 0x prefix (0xFF)'},
  {id:'hexspc', l:'Hex Bytes',   g:'Formatted', r:16,d:'Hex space-separated bytes (FF 0A …)'},
  {id:'bingrp', l:'Bin Nibbles', g:'Formatted', r:2, d:'Binary grouped in nibbles (1111 0000)'},
  // ALL
  {id:'ALL',    l:'All',         g:'ALL',        r:0, d:'Show all conversions at once'},
];

var _f='dec', _t='bin', _bw=8;
var B58='123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz';
var B62='0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz';

var $=function(id){return document.getElementById(id);};
function gv(id){return $(id).value;}
function sv(id,v){$(id).value=v;}

/* ── Build grids ──────────────────────────────────────────── */
function buildGrids(){
  buildG('gFrom',_f,'f');
  buildG('gTo',  _t,'t');
  updDir(); updInfo(); updXOpts();
}
function buildG(cid,active,role){
  var w=$(cid); w.innerHTML='';
  var groups={},order=[];
  BASES.forEach(function(b){
    if(!groups[b.g]){groups[b.g]=[];order.push(b.g);}
    groups[b.g].push(b);
  });
  order.forEach(function(grp){
    var lbl=document.createElement('div');
    lbl.className='grp-label';lbl.textContent=grp;lbl.style.marginTop='4px';
    w.appendChild(lbl);
    var g=document.createElement('div');g.className='base-grid';
    groups[grp].forEach(function(b){
      var btn=document.createElement('button');
      btn.id=role+'_'+b.id;
      var cls=(b.id===active)?(role==='f'?'af':'at'):'';
      btn.className='base-btn'+(cls?' '+cls:'');
      btn.textContent=b.l; btn.title=b.d;
      btn.onclick=(function(id,r){return function(){selBase(id,r);};})(b.id,role);
      g.appendChild(btn);
    });
    w.appendChild(g);
  });
}
function selBase(id,role){
  if(role==='f'){
    _f=id;
    BASES.forEach(function(b){var btn=$('f_'+b.id);if(btn)btn.className='base-btn'+(b.id===id?' af':'');});

function getB(id){return BASES.find(function(b){return b.id===id;})||null;}
function updDir(){

  $('dF').textContent=f?f.l:'?';
  $('dT').textContent=t?t.l:'?';
}
function updInfo(){

function updXOpts(){

  var nb=bwNeeded.includes(_f)||bwNeeded.includes(_t);

function setBW(w){

  [8,16,32,64].forEach(function(b){var el=$('bw'+b);if(el)el.className='base-btn'+(b===w?' af':'');});
}

/* ── Parsing (string → BigInt/float) ─────────────────────── */
function parseNum(str,baseId){
  str=str.trim().replace(/\s+/g,'');
  if(!str)throw new Error('Input is empty');
  var b=getB(baseId);

  // Hex 0x prefix
  if(baseId==='hex0x')return parseNum(str.replace(/^0[xX]/,''),'hex');
  if(baseId==='hexspc')return parseNum(str.replace(/\s+/g,''),'hex');
  if(baseId==='bingrp')return parseNum(str.replace(/\s+/g,''),'bin');

  // Standard radix 2–36
  if(b&&b.r>=2&&b.r<=36){
    var radix=b.r;
    var s=str.replace(/^0[xXbBoO]/,'');
    var neg=s[0]==='-';if(neg)s=s.slice(1);
    if(!s)throw new Error('Empty value');
    var CHARS='0123456789abcdefghijklmnopqrstuvwxyz';
    s=s.toLowerCase();
    var n=BigInt(0);
    for(var i=0;i<s.length;i++){
      var d=CHARS.indexOf(s[i]);
      if(d<0||d>=radix)throw new Error('Invalid digit "'+s[i]+'" for base '+radix);
      n=n*BigInt(radix)+BigInt(d);
    }
    return {n:neg?-n:n,f:null};
  }

  // Custom base
  if(baseId==='cust'){
    var radix=Math.max(2,Math.min(36,parseInt(gv('custVal'))||36));
    var fakeB={id:'cust',r:radix,l:'Base'+radix};
    var s=str,neg=s[0]==='-';if(neg)s=s.slice(1);
    var CHARS='0123456789abcdefghijklmnopqrstuvwxyz';
    s=s.toLowerCase();var n=BigInt(0);
    for(var i=0;i<s.length;i++){
      var d=CHARS.indexOf(s[i]);
      if(d<0||d>=radix)throw new Error('Invalid digit "'+s[i]+'" for base '+radix);
      n=n*BigInt(radix)+BigInt(d);
    }
    return {n:neg?-n:n,f:null};
  }

  // Base58
  if(baseId==='b58'){
    var s=str,neg=s[0]==='-';if(neg)s=s.slice(1);
    var n=BigInt(0);
    for(var i=0;i<s.length;i++){
      var v=B58.indexOf(s[i]);
      if(v<0)throw new Error('Invalid Base58 char: '+s[i]);
      n=n*BigInt(58)+BigInt(v);
    }
    return {n:neg?-n:n,f:null};
  }

  // Base62
  if(baseId==='b62'){
    var s=str,neg=s[0]==='-';if(neg)s=s.slice(1);
    var n=BigInt(0);
    for(var i=0;i<s.length;i++){
      var v=B62.indexOf(s[i]);
      if(v<0)throw new Error('Invalid Base62 char: '+s[i]);
      n=n*BigInt(62)+BigInt(v);
    }
    return {n:neg?-n:n,f:null};
  }

  // Scientific / Engineering
  if(baseId==='sci'||baseId==='eng'){
    var v=parseFloat(str.replace(/[×xX×]/g,'e').replace(/\^/g,'').replace(/\s/g,''));
    if(isNaN(v))throw new Error('Invalid notation: '+str);
    return {n:BigInt(Math.round(v)),f:v};
  }




  // Two's complement (binary string)
  if(baseId==='twos'){
    var s=str.replace(/\s/g,'');
    if(s[0]==='1'){
      var inv=s.split('').map(function(b){return b==='0'?'1':'0';}).join('');
      return {n:-(BigInt('0b'+inv)+BigInt(1)),f:null};
    }
    return {n:BigInt('0b'+s),f:null};
  }
  // One's complement
  if(baseId==='ones'){
    var s=str.replace(/\s/g,'');
    if(s[0]==='1'){
      var inv=s.split('').map(function(b){return b==='0'?'1':'0';}).join('');
      return {n:-BigInt('0b'+inv),f:null};
    }
    return {n:BigInt('0b'+s),f:null};
  }
  // Sign-magnitude
  if(baseId==='smag'){
    var s=str.replace(/\s/g,'');
    return {n:(s[0]==='1'?-BigInt('0b'+s.slice(1)):BigInt('0b'+s.slice(1))),f:null};
  }
  // BCD
  if(baseId==='bcd'){
    var groups=str.trim().split(/\s+/),numStr='';
    groups.forEach(function(g){numStr+=parseInt(g,2).toString();});
    return {n:BigInt(numStr),f:null};
  }
  // Gray code
  if(baseId==='gray'){
    var s=str.replace(/\s/g,'');
    var g=BigInt('0b'+s),n=g;
    while(g>>=BigInt(1))n^=g;
    return {n:n,f:null};
  }
  // IEEE 754
  if(baseId==='ieee32'||baseId==='ieee64'){
    var s=str.replace(/\s/g,'');
    var f=ieee2f(s,baseId==='ieee32'?32:64);
    return {n:BigInt(Math.round(f)),f:f};
  }
  // Excess-N
  if(baseId==='excess'){
    var bias=Math.pow(2,_bw-1)-1;
    var s=str.replace(/\s/g,'');
    return {n:BigInt(parseInt(s,2)-bias),f:null};
  }

  throw new Error('Unknown base: '+baseId);
}

/* ── Formatting (BigInt/float → string) ────────────────────── */
function fmtNum(n,f,baseId){
  var b=getB(baseId);
  var num=Number(n);

  if(baseId==='hex0x') return '0x'+fmtNum(n,f,'hex').toUpperCase();
  if(baseId==='hexspc'){
    var h=fmtNum(n,f,'hex').toUpperCase();
    if(h.length%2)h='0'+h;
    return h.match(/.{2}/g).join(' ');
  }
  if(baseId==='bingrp'){
    var bin=fmtNum(n,f,'bin');
    while(bin.length%4)bin='0'+bin;
    return bin.match(/.{4}/g).join(' ');
  }

  // Standard radix
  if(b&&b.r>=2&&b.r<=36){
    var neg=n<BigInt(0),abs=neg?-n:n;
    return (neg?'-':'')+b2s(abs,b.r);
  }
  if(baseId==='cust'){
    var radix=Math.max(2,Math.min(36,parseInt(gv('custVal'))||36));
    var neg=n<BigInt(0),abs=neg?-n:n;
    return (neg?'-':'')+b2s(abs,radix);
  }
  if(baseId==='b58'){
    var neg=n<BigInt(0),abs=neg?-n:n;
    if(abs===BigInt(0))return '1';
    var r='';while(abs>BigInt(0)){r=B58[Number(abs%BigInt(58))]+r;abs=abs/BigInt(58);}
    return (neg?'-':'')+r;
  }
  if(baseId==='b62'){
    var neg=n<BigInt(0),abs=neg?-n:n;
    if(abs===BigInt(0))return '0';
    var r='';while(abs>BigInt(0)){r=B62[Number(abs%BigInt(62))]+r;abs=abs/BigInt(62);}
    return (neg?'-':'')+r;
  }
  if(baseId==='sci'){
    var v=f!==null?f:num;
    return v.toExponential(6).replace(/e([+-])/g,'×10^$1').replace(/×10\^\+/g,'×10^');
  }
  if(baseId==='eng'){
    var v=f!==null?f:num;
    if(v===0)return '0';
    var exp=Math.floor(Math.log10(Math.abs(v))/3)*3;
    var m=v/Math.pow(10,exp);
    return m.toFixed(4).replace(/\.?0+$/,'')+'×10^'+exp;
  }


  if(baseId==='twos'){
    var neg=n<BigInt(0);
    if(!neg)return n.toString(2).padStart(_bw,'0');
    var inv=(BigInt(1)<<BigInt(_bw))-(-n);
    return inv.toString(2).padStart(_bw,'0');
  }
  if(baseId==='ones'){
    var neg=n<BigInt(0);
    if(!neg)return n.toString(2).padStart(_bw,'0');
    var all=(BigInt(1)<<BigInt(_bw))-BigInt(1);
    return (all-(-n)+BigInt(1)).toString(2).padStart(_bw,'0');
  }
  if(baseId==='smag'){
    var neg=n<BigInt(0),abs=neg?-n:n;
    return (neg?'1':'0')+abs.toString(2).padStart(_bw-1,'0');
  }
  if(baseId==='bcd'){
    return Math.abs(num).toString().split('').map(function(d){return parseInt(d).toString(2).padStart(4,'0');}).join(' ');
  }
  if(baseId==='gray'){
    var abs=n<BigInt(0)?-n:n;
    return (abs^(abs>>BigInt(1))).toString(2).padStart(_bw,'0');
  }
  if(baseId==='ieee32')  return f2ieee(f!==null?f:num,32);
  if(baseId==='ieee64')  return f2ieee(f!==null?f:num,64);
  if(baseId==='excess'){
    var bias=Math.pow(2,_bw-1)-1;
    return (num+bias).toString(2).padStart(_bw,'0');
  }

  throw new Error('Cannot format: '+baseId);
}

function b2s(n,r){
  if(n===BigInt(0))return '0';
  var C='0123456789abcdefghijklmnopqrstuvwxyz',s='',b=BigInt(r);
  while(n>BigInt(0)){s=C[Number(n%b)]+s;n=n/b;}
  return s;
}

/* ── IEEE 754 ─────────────────────────────────────────────── */
function f2ieee(v,bits){
  var buf=new ArrayBuffer(bits/8);
  if(bits===32)new DataView(buf).setFloat32(0,v,false);
  else new DataView(buf).setFloat64(0,v,false);
  return Array.from(new Uint8Array(buf),function(b){return b.toString(2).padStart(8,'0');}).join(' ');
}
function ieee2f(s,bits){
  s=s.replace(/\s/g,'');
  var buf=new ArrayBuffer(bits/8),view=new DataView(buf);
  for(var i=0;i<s.length;i+=8)view.setUint8(i/8,parseInt(s.slice(i,i+8),2));
  return bits===32?view.getFloat32(0,false):view.getFloat64(0,false);
}



/* ── Main actions ─────────────────────────────────────────── */
function doConvert(){
  try{
    var inp=gv('iIn').trim();
    if(!inp)throw new Error('Input is empty');
    if(_t==='ALL'){convertAll(inp);return;}
    var p=parseNum(inp,_f);
    sv('iOut',fmtNum(p.n,p.f,_t));
    $('iOut').classList.remove('ok','fail');
    showStatus(getB(_f).l+' → '+getB(_t).l+' converted','success');
  }catch(e){showStatus(e.message,'error');console.error(e);}
}

function doReverse(){
  try{
    var inp=gv('iOut').trim();
    if(!inp)throw new Error('Output panel is empty');
    if(_t==='ALL')throw new Error('Select a specific TO base to reverse');
    var p=parseNum(inp,_t);
    sv('iIn',fmtNum(p.n,p.f,_f));
    $('iOut').classList.remove('ok','fail');
    showStatus(getB(_t).l+' → '+getB(_f).l+' reversed','success');
  }catch(e){showStatus(e.message,'error');console.error(e);}
}

function doVerify(){
  try{
    var l=gv('iIn').trim(),r=gv('iOut').trim();
    if(!l||!r)throw new Error('Both panels must have content');
    if(_t==='ALL')throw new Error('Select a specific TO base to verify');
    var pl=parseNum(l,_f),pr=parseNum(r,_t);
    var match=(pl.n===pr.n)||(pl.f!==null&&pr.f!==null&&Math.abs(pl.f-pr.f)<1e-9);
    $('iOut').classList.remove('ok','fail');
    $('iOut').classList.add(match?'ok':'fail');
    showStatus(match?'Equivalent - same numeric value':'Not equivalent - values differ',match?'success':'error');
  }catch(e){showStatus(e.message,'error');}
}

function convertAll(inp){
  var wrap=$('aWrap');wrap.innerHTML='';
  var p;
  try{p=parseNum(inp,_f);}catch(e){showStatus(e.message,'error');return;}
  var groups={},order=[];
  BASES.forEach(function(b){
    if(b.id==='ALL'||b.id===_f)return;
    if(!groups[b.g]){groups[b.g]=[];order.push(b.g);}
    groups[b.g].push(b);
  });
  order.forEach(function(grp){
    var sec=document.createElement('div');sec.className='all-sec';sec.textContent=grp;wrap.appendChild(sec);
    groups[grp].forEach(function(b){
      var val;
      try{val=fmtNum(p.n,p.f,b.id);}catch(e){val='- ('+e.message+')';}
      var row=document.createElement('div');row.className='all-row';
      var lbl=document.createElement('div');lbl.className='all-lbl';lbl.textContent=b.l;
      var v=document.createElement('div');v.className='all-val';v.textContent=val;
      var cp=document.createElement('button');cp.className='all-cp';
      cp.innerHTML='<i class="fa-regular fa-copy"></i>';cp.title='Copy';
      cp.onclick=(function(t){return function(){cpRaw(t);};})(val);
      row.appendChild(lbl);row.appendChild(v);row.appendChild(cp);
      wrap.appendChild(row);
    });
  });
  showStatus('All conversions from '+getB(_f).l,'success');
}

function doSwap(){
  var a=gv('iIn'),b=gv('iOut'); sv('iIn',b); sv('iOut',a);
  var tmp=_f;_f=_t;_t=tmp;
  $('iOut').classList.remove('ok','fail');
  $('aWrap').innerHTML='';
  buildGrids();
  var isAll=(_t==='ALL');
  $('iOut').style.display=isAll?'none':'';
  $('aWrap').style.display=isAll?'flex':'none';
  $('oTB').style.display=isAll?'none':'';
  showStatus('Panels and bases swapped','success');
}

/* ── Helpers ──────────────────────────────────────────────── */
function cpText(id){
  var v=gv(id);if(!v){showStatus('Nothing to copy','warn');return;}
  var ok=function(){showStatus('Copied to clipboard','success');};
  var fail=function(){try{$(id).select();document.execCommand('copy');ok();}catch(e){showStatus('Copy failed','error');}};
  (navigator.clipboard&&navigator.clipboard.writeText?navigator.clipboard.writeText(v):Promise.reject()).then(ok).catch(fail);
}
function cpRaw(v){
  (navigator.clipboard&&navigator.clipboard.writeText?navigator.clipboard.writeText(v):Promise.reject())
    .then(function(){showStatus('Copied','success');}).catch(function(){showStatus('Copy failed','error');});
}
function clrField(id){
  sv(id,'');
  if(id==='iOut'){$('iOut').classList.remove('ok','fail');$('aWrap').innerHTML='';}
  showStatus('Cleared','success');
}
function dlText(id,name){
  var v=gv(id);if(!v){showStatus('Nothing to save','warn');return;}
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([v],{type:'text/plain'}));
  a.download=name;a.click();URL.revokeObjectURL(a.href);
  showStatus('Download started','success');
}
var _st;
function showStatus(m,t){
  t=t||'success';var s=$('status');
  s.textContent=m;s.className='status '+t;s.style.display='block';
  clearTimeout(_st);_st=setTimeout(function(){s.style.display='none';},4000);
}

/* ── Share URL ────────────────────────────────────────────── */
function b64uE(s){var b=new TextEncoder().encode(s),r='';b.forEach(function(x){r+=String.fromCharCode(x);});return btoa(r).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');}
function b64uD(s){s=s.replace(/-/g,'+').replace(/_/g,'/');while(s.length%4)s+='=';var b=atob(s),a=new Uint8Array(b.length);for(var i=0;i<b.length;i++)a[i]=b.charCodeAt(i);return new TextDecoder().decode(a);}
function shareURL(){
  var st={v:1,f:_f,t:_t,bw:_bw,cv:gv('custVal'),i:gv('iIn'),o:gv('iOut')};
  try{
    var url=window.location.href.split('#')[0]+'#s='+b64uE(JSON.stringify(st));
    var ok=function(){showStatus('Share URL copied to clipboard','success');};
    (navigator.clipboard&&navigator.clipboard.writeText?navigator.clipboard.writeText(url):Promise.reject()).then(ok).catch(function(){try{var ta=document.createElement('textarea');ta.value=url;ta.style.cssText='position:fixed;top:-9999px;opacity:0';document.body.appendChild(ta);ta.focus();ta.select();document.execCommand('copy');ok();document.body.removeChild(ta);}catch(e){prompt('Copy URL:',url);}});
  }catch(e){showStatus('Could not generate URL','error');}
}
function loadHash(){
  var h=window.location.hash;
  if(!h||h.indexOf('s=')===-1)return;
  try{
    var enc=new URLSearchParams(h.slice(1)).get('s');
    if(!enc)return;
    var st=JSON.parse(b64uD(enc));
    if(st.f)_f=st.f; if(st.t)_t=st.t;
    if(st.bw){_bw=st.bw;setBW(st.bw);}
    if(st.cv)sv('custVal',st.cv);
    if(st.i!==undefined)sv('iIn',st.i);
    if(st.o!==undefined)sv('iOut',st.o);
    buildGrids();
    var isAll=(_t==='ALL');
    $('iOut').style.display=isAll?'none':'';
    $('aWrap').style.display=isAll?'flex':'none';
    $('oTB').style.display=isAll?'none':'';
    showStatus('Configuration loaded from URL','success');
  }catch(e){console.warn('loadHash:',e);}
}
function resetAll(){
  if(!confirm('Reset all fields?'))return;
  sv('iIn','');sv('iOut','');
  $('iOut').classList.remove('ok','fail');
  $('aWrap').innerHTML='';
  sv('custVal','36');_f='dec';_t='bin';_bw=8;setBW(8);
  try{history.replaceState(null,'',location.pathname+location.search);}catch(e){}
  buildGrids();
  $('iOut').style.display=''; $('aWrap').style.display='none'; $('oTB').style.display='';
  showStatus('Reset complete','success');
}
function toggleTheme(){var n=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',n);localStorage.setItem('num-theme',n);$('themeIcon').className=n==='dark'?'fa-solid fa-sun':'fa-solid fa-moon';}
function loadTheme(){var t=localStorage.getItem('num-theme')||'light';document.documentElement.setAttribute('data-theme',t);$('themeIcon').className=t==='dark'?'fa-solid fa-sun':'fa-solid fa-moon';}
document.addEventListener('keydown',function(e){
  if(!(e.ctrlKey||e.metaKey))return;
  if(e.key.toLowerCase()==='e'){e.preventDefault();doConvert();}
  if(e.key.toLowerCase()==='d'){e.preventDefault();doReverse();}
  if(e.key.toLowerCase()==='r'){e.preventDefault();resetAll();}
});
loadTheme();loadHash();buildGrids();
