<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AES Encrypt / Decrypt - CyberKitchen</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <style>
    :root {
      --bg:#f8fafc;
      --surf:#ffffff;
      --inset:#f1f5f9;
      --inset2: #e4eaf1;
      --txt:#0f172a;
      --muted:#64748b;
      --acc:#3b82f6;
      --acc2:#2563eb;
      --ok:#10b981;
      --err:#ef4444;
      --warn:#f59e0b;
      --bdr:#e2e8f0;
      --shd:rgba(0,0,0,.07);
    }
    [data-theme="dark"] {
      --bg:#0d1117;
      --surf:#161b22;
      --inset: #21262d;
      --inset2:#2d333b;
      --txt:#e6edf3;
      --muted: #8b949e;
      --bdr:#30363d;
      --shd:rgba(0,0,0,.4);
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { overflow-x: hidden; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14.5px;
      background: var(--bg); color: var(--txt);
      padding: 10px 14px; line-height: 1.5;
      transition: background .25s, color .25s;
      overflow-x: hidden;
    }

    /* ─── Header ─────────────────────────────────────────── */
    .container { max-width: 1800px; margin: 0 auto; }

    /* Grid header: [left 1fr] [title auto] [right 1fr]
       Grid guarantees the title is always exactly centered regardless of
       side-element widths, and nothing can ever overlap. */
    header {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      margin-bottom: 10px; min-height: 38px;
    }
    .hdr-left  { display: flex; align-items: center; justify-content: flex-start; min-width: 0; }
    .hdr-right { display: flex; align-items: center; justify-content: flex-end; gap: 6px; min-width: 0; }
    h1 {
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 0 8px;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -.3px;
      background: linear-gradient(130deg, #3b82f6 0%, #8b5cf6 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .icon-btn {
      width: 34px; height: 34px; border-radius: 8px;
      background: var(--surf); border: 1px solid var(--bdr);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 14px; transition: all .2s;
    }
    .icon-btn:hover { border-color: var(--acc); color: var(--acc); transform: scale(1.08); }

    /* ─── 3-col layout ────────────────────────────────────── */
    .layout {
      display: grid;
      grid-template-columns: 1fr 316px 1fr;
      gap: 10px;
    }

    /* ─── Panel ───────────────────────────────────────────── */
    .panel {
      background: var(--surf);
      border: 1px solid var(--bdr);
      border-radius: 10px;
      padding: 12px;
      box-shadow: 0 1px 4px var(--shd);
      display: flex; flex-direction: column; gap: 8px;
      height: calc(100vh - 70px);
      min-height: 500px; max-height: 760px;
    }
    .panel-hdr {
      font-size: 13px; font-weight: 700; letter-spacing: .03em;
      color: var(--txt); text-transform: none;
      display: flex; align-items: center; gap: 6px;
    }
    .panel-hdr i { font-size: 13px; color: var(--muted); }

    /* ─── Toolbar ────────────────────────────────────────── */
    .toolbar {
      display: flex; align-items: center; gap: 5px;
      flex-wrap: nowrap;   /* stays one line on desktop */
    }
    .tb-sep { width: 1px; height: 14px; background: var(--bdr); flex-shrink: 0; margin: 0 2px; }
    .tb-fill { flex: 1; min-width: 0; }
    .tb-label { font-size: 12px; color: var(--txt); white-space: nowrap; flex-shrink: 0; font-weight: 700; }
    /* On mobile: hide text labels on toolbar buttons, keep icons only */
    @media (max-width: 600px) {
      .toolbar { gap: 4px; }
      .toolbar .btn-text { display: none; }
      .btn.xs { padding: 4px 7px; font-size: 12px; }
      .swap-btn .swap-text { display: none; }
      .swap-btn { padding: 4px 7px; }
      .tb-sep { display: none; }
    }

    /* ─── Textarea ────────────────────────────────────────── */
    textarea {
      flex: 1; width: 100%; resize: none; min-height: 0;
      padding: 9px 10px;
      font-family: 'SF Mono', 'Fira Code', 'Menlo', 'Consolas', monospace;
      font-size: 14px; line-height: 1.65;
      background: var(--inset); color: var(--txt);
      border: 1px solid var(--bdr); border-radius: 7px;
      outline: none; transition: border-color .18s;
    }
    textarea:focus { border-color: var(--acc); }
    textarea::placeholder { color: var(--muted); opacity: .55; font-style: italic; }
    textarea::-webkit-scrollbar { width: 6px; }
    textarea::-webkit-scrollbar-thumb { background: var(--bdr); border-radius: 3px; }

    /* ─── Controls (middle) ───────────────────────────────── */
    .ctrl-scroll {
      flex: 1; display: flex; flex-direction: column; gap: 7px;
      overflow-y: auto; min-height: 0; padding-right: 1px;
    }
    .ctrl-scroll::-webkit-scrollbar { width: 4px; }
    .ctrl-scroll::-webkit-scrollbar-thumb { background: var(--bdr); border-radius: 2px; }

    .field { display: flex; flex-direction: column; gap: 3px; }
    .field > label { font-size: 12px; font-weight: 600; color: var(--muted); letter-spacing: .02em; }

    /* key/iv row: [text input | fmt select | gen btn] */
    .key-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 5px; align-items: center;
    }

    /* ─── Form controls ───────────────────────────────────── */
    input[type="text"], select {
      background: var(--inset); color: var(--txt);
      border: 1px solid var(--bdr); border-radius: 6px;
      padding: 6px 8px; font-size: 13px;
      outline: none !important;          /* kill browser focus ring */
      box-shadow: none !important;       /* kill browser glow */
      transition: border-color .18s, background .18s; width: 100%;
      -webkit-appearance: none;
      appearance: none;
    }
    /* Neutralize all browser :valid / :invalid automatic coloring */
    input:valid, input:invalid,
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus {
      border-color: var(--bdr) !important;
      box-shadow: none !important;
      outline: none !important;
    }
    input[type="text"]:focus, select:focus { border-color: var(--acc); background: var(--bg); }
    /* These ONLY apply when JS explicitly sets these classes */
    input.key-ok   { border-color: var(--ok)  !important; }
    input.key-warn { border-color: var(--warn) !important; }

    select.sm {
      padding: 5px 5px; font-size: 12px; border-radius: 5px;
      cursor: pointer; flex-shrink: 0; width: auto;
    }

    /* ─── Buttons ─────────────────────────────────────────── */
    .btn {
      border: none; border-radius: 6px; font-weight: 600;
      cursor: pointer; display: inline-flex; align-items: center;
      justify-content: center; gap: 5px; transition: all .16s;
      white-space: nowrap; flex-shrink: 0; font-size: 12px;
      font-weight: 400;
    }
    .btn:active { transform: scale(.95); }
    .btn.xs { padding: 4px 8px; font-size: 12px; }
    .btn.sm { padding: 5px 10px; font-size: 13px; }

    .btn-ghost {
      background: var(--inset); color: var(--txt);
      border: 1px solid var(--bdr);
    }
    .btn-ghost:hover { background: var(--inset2); }

    .btn-enc {
      flex: 1;
      background: linear-gradient(135deg, #10b981, #059669);
      color: #fff; padding: 9px 12px; font-size: 14px;
      font-weight:700;
    }
    .btn-dec {
      flex: 1;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: #fff; padding: 9px 12px; font-size: 14px;
      font-weight:700;
    }
    .btn-enc:hover, .btn-dec:hover {
      filter: brightness(1.1); transform: translateY(-1px);
      box-shadow: 0 4px 12px var(--shd);
    }

    .swap-btn {
      background: transparent; border: 1px solid var(--bdr);
      color: var(--muted); border-radius: 6px; padding: 4px 8px;
      cursor: pointer; flex-shrink: 0; font-size: 13px;
      display: inline-flex; align-items: center; gap: 4px;
      transition: all .18s; font-weight: 500;
    }
    .swap-btn:hover { color: var(--acc); border-color: var(--acc); }

    .act-row { display: flex; gap: 7px; }
    .bot-row { display: flex; gap: 6px; }

    /* ─── Key badge ───────────────────────────────────────── */
    .info-bar {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--inset); border: 1px solid var(--bdr);
      border-radius: 6px; padding: 4px 9px; font-size: 12px; color: var(--muted);
    }
    .badge {
      font-size: 11px; font-weight: 700; padding: 2px 7px;
      border-radius: 4px; letter-spacing: .04em;
      background: var(--inset2); color: var(--muted);
    }
    .badge-128 { background: rgba(16,185,129,.15); color: #10b981; }
    .badge-192 { background: rgba(59,130,246,.15);  color: #3b82f6; }
    .badge-256 { background: rgba(139,92,246,.15);  color: #8b5cf6; }
    .badge-bad { background: rgba(245,158,11,.15);  color: var(--warn); }

    .divider { height: 1px; background: var(--bdr); flex-shrink: 0; }
    .spacer  { flex: 1; min-height: 2px; }

    /* ─── Status ──────────────────────────────────────────── */
    .status {
      padding: 6px 10px; border-radius: 6px; font-size: 12px;
      display: none; flex-shrink: 0; animation: pop .2s ease; font-size: 13px;
    }
    .status.success { background: rgba(16,185,129,.12); color: var(--ok);   border: 1px solid rgba(16,185,129,.25); }
    .status.error   { background: rgba(239,68,68,.12);  color: var(--err);  border: 1px solid rgba(239,68,68,.25); }
    .status.warn    { background: rgba(245,158,11,.12); color: var(--warn); border: 1px solid rgba(245,158,11,.25); }

    @keyframes pop { from { opacity:0; transform:scale(.97); } to { opacity:1; transform:scale(1); } }

    /* ─── CyberKitchen back link ──────────────────────────── */
    .home-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 600; color: var(--muted);
      text-decoration: none; padding: 5px 10px;
      border: 1px solid var(--bdr); border-radius: 7px;
      background: var(--surf); transition: all .18s;
      white-space: nowrap; overflow: hidden; min-width: 0;
    }
    .home-link:hover {
      color: var(--acc); border-color: var(--acc);
      background: var(--inset);
    }
    .home-link i { font-size: 12px; flex-shrink: 0; }
    /* Hide the text label on small screens - keep only icons */
    @media (max-width: 540px) {
      .home-link .link-text { display: none; }
      .home-link { padding: 5px 8px; gap: 4px; }
    }
    @media (max-width: 1100px) {
      .layout { grid-template-columns: 1fr; }
      .panel  { height: auto; max-height: none; min-height: 260px; }
      textarea { min-height: 140px; }
    }
    @media (max-width: 600px) {
      body { padding: 6px 8px; }
      h1   { font-size: 16px; }
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="hdr-left">
      <a href="/CyberKitchen" class="home-link" title="Back to CyberKitchen">
        <i class="fa-solid fa-arrow-left"></i>
        <span class="link-text">CyberKitchen</span>
      </a>
    </div>
    <h1>AES Encrypt / Decrypt</h1>
    <div class="hdr-right">
      <button class="icon-btn" id="themeBtn" onclick="toggleTheme()" title="Toggle theme">
        <i class="fa-solid fa-moon" id="themeIcon"></i>
      </button>
    </div>
  </header>

  <div class="layout">

    <!-- ══ LEFT: Ciphertext ══ -->
    <div class="panel">
      <div class="panel-hdr">
        <i class="fa-solid fa-lock"></i> CIPHERTEXT
      </div>
      <div class="toolbar">
        <button class="btn btn-ghost xs" onclick="copyText('ct')" title="Copy">
          <i class="fa-regular fa-copy"></i><span class="btn-text"> Copy</span>
        </button>
        <button class="btn btn-ghost xs" onclick="clearField('ct')" title="Clear">
          <i class="fa-regular fa-trash-can"></i><span class="btn-text"> Clear</span>
        </button>
        <button class="btn btn-ghost xs" onclick="dlText('ct','ciphertext.txt')" title="Download">
          <i class="fa-solid fa-download"></i><span class="btn-text"> Save</span>
        </button>
        <div class="tb-sep"></div>
        <span class="tb-label">Format</span>
        <select class="sm" id="ctFmt">
          <option value="base64">Base64</option>
          <option value="hex">Hex</option>
        </select>
        <div class="tb-fill"></div>
        <button class="swap-btn" onclick="swapPanels()" title="Swap ciphertext and plaintext">
          <i class="fa-solid fa-right-left"></i><span class="swap-text"> Swap</span>
        </button>
      </div>
      <textarea id="ct" placeholder="Paste ciphertext here to decrypt"></textarea>
    </div>

    <!-- ══ MIDDLE: Config ══ -->
    <div class="panel">
      <div class="panel-hdr">
        <i class="fa-solid fa-gear"></i> CONFIGURATION
      </div>
      <div class="ctrl-scroll">

        <!-- Key -->
        <div class="field">
          <label>Encryption Key</label>
          <div class="key-row">
            <input type="text" id="key" placeholder="Enter key"
                   oninput="updateKeyBadge()" autocomplete="off" spellcheck="false">
            <select class="sm" id="keyFmt" onchange="onKeyFmtChange()" title="Key format">
              <option value="utf8">UTF-8</option>
              <option value="hex">Hex</option>
              <option value="base64">Base64</option>
            </select>
            <button class="btn btn-ghost xs" onclick="generateKey()" title="Generate random 256-bit key (Ctrl+K)">
              <i class="fa-solid fa-shuffle"></i>
            </button>
          </div>
        </div>

        <!-- Key badge -->
        <div class="info-bar">
          <span>Key size</span>
          <span class="badge" id="keyBadge">-</span>
        </div>

        <!-- IV -->
        <div class="field" id="ivWrap">
          <label>Initialization Vector (IV)</label>
          <div class="key-row">
            <input type="text" id="iv" placeholder="Enter IV"
                   autocomplete="off" spellcheck="false">
            <select class="sm" id="ivFmt" title="IV format">
              <option value="utf8">UTF-8</option>
              <option value="hex">Hex</option>
              <option value="base64">Base64</option>
            </select>
            <button class="btn btn-ghost xs" onclick="generateIV()" title="Generate random 128-bit IV (Ctrl+I)">
              <i class="fa-solid fa-shuffle"></i>
            </button>
          </div>
        </div>

        <div class="divider"></div>

        <!-- Mode -->
        <div class="field">
          <label>AES Mode</label>
          <select id="mode" onchange="onModeChange()">
            <option value="CBC">CBC - Cipher Block Chaining</option>
            <option value="ECB">ECB - Electronic Codebook</option>
            <option value="CFB">CFB - Cipher Feedback</option>
            <option value="OFB">OFB - Output Feedback</option>
            <option value="CTR">CTR - Counter Mode</option>
          </select>
        </div>

        <!-- Padding -->
        <div class="field" id="padWrap">
          <label>Padding</label>
          <select id="pad">
            <option value="Pkcs7">PKCS#7 (recommended)</option>
            <option value="ZeroPadding">Zero Padding</option>
            <option value="Iso10126">ISO 10126</option>
            <option value="AnsiX923">ANSI X9.23</option>
            <option value="NoPadding">No Padding (exact block)</option>
          </select>
        </div>

        <div class="divider"></div>

        <!-- Decrypt (left) / Encrypt (right) -->
        <!-- Layout: Ciphertext panel is LEFT, Plaintext panel is RIGHT
             Decrypt: takes ciphertext (←) and outputs plaintext (→ right panel)  → arrow points RIGHT
             Encrypt: takes plaintext (→) and outputs ciphertext (← left panel)   → arrow points LEFT -->
        <div class="act-row">
          <button class="btn btn-dec" onclick="doDecrypt()" title="Decrypt ciphertext → plaintext (Ctrl+D)">
            <i class="fa-solid fa-lock-open"></i> Decrypt
            <i class="fa-solid fa-arrow-right" style="font-size:11px"></i>
          </button>
          <button class="btn btn-enc" onclick="doEncrypt()" title="Encrypt plaintext → ciphertext (Ctrl+E)">
            <i class="fa-solid fa-arrow-left" style="font-size:11px"></i>
            <i class="fa-solid fa-lock"></i> Encrypt
          </button>
        </div>

        <div id="status" class="status"></div>

        <div class="spacer"></div>
        <div class="divider"></div>

        <div style="font-size:12px;color:var(--muted);text-align:center;line-height:2;font-weight:700">
          Ctrl+E &nbsp;Encrypt &nbsp;&nbsp; Ctrl+D &nbsp;Decrypt &nbsp;&nbsp; Ctrl+R &nbsp;Reset
        </div>

        <div class="bot-row">
          <button class="btn btn-ghost sm" style="flex:1" onclick="shareConfig()">
            <i class="fa-solid fa-link"></i> Share URL
          </button>
          <button class="btn btn-ghost sm" style="flex:1" onclick="resetAll()">
            <i class="fa-solid fa-rotate"></i> Reset
          </button>
        </div>

      </div>
    </div>

    <!-- ══ RIGHT: Plaintext ══ -->
    <div class="panel">
      <div class="panel-hdr">
        <i class="fa-regular fa-file-lines"></i> PLAINTEXT
      </div>
      <div class="toolbar">
        <button class="btn btn-ghost xs" onclick="copyText('pt')">
          <i class="fa-regular fa-copy"></i><span class="btn-text"> Copy</span>
        </button>
        <button class="btn btn-ghost xs" onclick="clearField('pt')">
          <i class="fa-regular fa-trash-can"></i><span class="btn-text"> Clear</span>
        </button>
        <button class="btn btn-ghost xs" onclick="dlText('pt','plaintext.txt')">
          <i class="fa-solid fa-download"></i><span class="btn-text"> Save</span>
        </button>
        <div class="tb-sep"></div>
        <span class="tb-label">Format</span>
        <select class="sm" id="ptFmt">
          <option value="utf8">UTF-8</option>
          <option value="base64">Base64</option>
          <option value="hex">Hex</option>
        </select>
        <div class="tb-fill"></div>
      </div>
      <textarea id="pt" placeholder="Type or paste plaintext to encrypt"></textarea>
    </div>

  </div>
</div>

<script>
'use strict';

// ─── DOM helpers ──────────────────────────────────────────────────────────────
const $ = function(id){ return document.getElementById(id); };
function gv(id){ return $(id).value; }
function sv(id, v){ $(id).value = v; }

// ─── WordArray ↔ string ───────────────────────────────────────────────────────
function toWA(str, fmt) {
  if (!str) return null;
  try {
    if (fmt === 'hex')    return CryptoJS.enc.Hex.parse(str.replace(/\s/g,''));
    if (fmt === 'base64') return CryptoJS.enc.Base64.parse(str.trim());
    return CryptoJS.enc.Utf8.parse(str);
  } catch(e) { throw new Error('Cannot parse ' + fmt.toUpperCase() + ': ' + e.message); }
}

function waToStr(wa, fmt) {
  if (fmt === 'hex')    return wa.toString(CryptoJS.enc.Hex);
  if (fmt === 'base64') return wa.toString(CryptoJS.enc.Base64);
  return wa.toString(CryptoJS.enc.Utf8);
}

// ─── Key byte-length ──────────────────────────────────────────────────────────
function keyByteLen(val, fmt) {
  if (!val) return 0;
  if (fmt === 'hex') return val.replace(/\s/g,'').length / 2;
  if (fmt === 'base64') {
    var s = val.replace(/\s/g,'');
    var pad = s.endsWith('==') ? 2 : s.endsWith('=') ? 1 : 0;
    return Math.floor(s.length * 3 / 4) - pad;
  }
  return new TextEncoder().encode(val).length;
}

function updateKeyBadge() {
  var val = gv('key');
  var fmt = gv('keyFmt');
  var ki  = $('key');
  var b   = $('keyBadge');

  // Always reset first
  b.className  = 'badge';
  b.textContent = '-';
  ki.classList.remove('key-ok', 'key-warn');

  if (!val) return; // empty → neutral, no outline at all

  var n = keyByteLen(val, fmt);

  // Valid AES key byte sizes: 16 (AES-128), 24 (AES-192), 32 (AES-256)
  if (n === 16) {
    b.classList.add('badge-128');
    b.textContent = 'AES-128  (128-bit)';
    ki.classList.add('key-ok');
  } else if (n === 24) {
    b.classList.add('badge-192');
    b.textContent = 'AES-192  (192-bit)';
    ki.classList.add('key-ok');
  } else if (n === 32) {
    b.classList.add('badge-256');
    b.textContent = 'AES-256  (256-bit)';
    ki.classList.add('key-ok');
  } else {
    // Invalid size - show what is needed for this format
    var hint;
    if (fmt === 'hex')
      hint = 'need 32, 48 or 64 hex chars';
    else if (fmt === 'base64')
      hint = 'need 24, 32 or 44 base64 chars';
    else
      hint = 'need 16, 24 or 32 chars';
    b.classList.add('badge-bad');
    b.textContent = (n * 8) + '-bit - ' + hint;
    ki.classList.add('key-warn');
  }
}

// ─── Mode / padding visibility ────────────────────────────────────────────────
function onModeChange() {
  var m = gv('mode'), needIV = m !== 'ECB';
  $('ivWrap').style.opacity  = needIV ? '1' : '.35';
  $('iv').disabled            = !needIV;
  $('ivFmt').disabled         = !needIV;
  var stream = (m === 'CTR' || m === 'OFB' || m === 'CFB');
  $('padWrap').style.opacity  = stream ? '.35' : '1';
}

function onKeyFmtChange() { updateKeyBadge(); }

// ─── Random key / IV generation ───────────────────────────────────────────────
// UTF-8 mode: use printable ASCII (random bytes ≠ valid UTF-8)
var CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()-_=+[]|;:<>?';
function randPrintable(len) {
  var buf = new Uint8Array(len);
  crypto.getRandomValues(buf);
  return Array.from(buf, function(b){ return CHARS[b % CHARS.length]; }).join('');
}

function generateKey() {
  var fmt = gv('keyFmt'), v;
  if      (fmt === 'hex')    v = CryptoJS.lib.WordArray.random(32).toString(CryptoJS.enc.Hex);
  else if (fmt === 'base64') v = CryptoJS.lib.WordArray.random(32).toString(CryptoJS.enc.Base64);
  else                       v = randPrintable(32);
  sv('key', v); updateKeyBadge();
  showStatus('256-bit key generated', 'success');
}

function generateIV() {
  var fmt = gv('ivFmt'), v;
  if      (fmt === 'hex')    v = CryptoJS.lib.WordArray.random(16).toString(CryptoJS.enc.Hex);
  else if (fmt === 'base64') v = CryptoJS.lib.WordArray.random(16).toString(CryptoJS.enc.Base64);
  else                       v = randPrintable(16);
  sv('iv', v);
  showStatus('128-bit IV generated', 'success');
}

// ─── Validation ───────────────────────────────────────────────────────────────
function validate() {
  if (!gv('key').trim()) throw new Error('Encryption key is required');
  var n = keyByteLen(gv('key').trim(), gv('keyFmt'));
  if (n && [16,24,32].indexOf(n) === -1)
    throw new Error('Invalid key size: ' + (n*8) + '-bit. AES needs 128, 192, or 256-bit');
  if (gv('mode') !== 'ECB' && !gv('iv').trim())
    throw new Error('IV is required for ' + gv('mode') + ' mode');
}

// ─── Encrypt ──────────────────────────────────────────────────────────────────
function doEncrypt() {
  try {
    validate();
    var raw = gv('pt');
    if (!raw) throw new Error('Plaintext is empty');
    var mode = gv('mode');
    var keyWA = toWA(gv('key').trim(), gv('keyFmt'));
    var ivWA  = mode !== 'ECB' ? toWA(gv('iv').trim(), gv('ivFmt')) : undefined;
    var ptWA  = toWA(raw, gv('ptFmt'));
    var opts  = { mode: CryptoJS.mode[mode], padding: CryptoJS.pad[gv('pad')] };
    if (ivWA) opts.iv = ivWA;
    var enc = CryptoJS.AES.encrypt(ptWA, keyWA, opts);
    sv('ct', gv('ctFmt') === 'base64'
      ? enc.ciphertext.toString(CryptoJS.enc.Base64)
      : enc.ciphertext.toString(CryptoJS.enc.Hex));
    showStatus('Encryption successful', 'success');
  } catch(e) { showStatus(e.message, 'error'); console.error(e); }
}

// ─── Decrypt ──────────────────────────────────────────────────────────────────
function doDecrypt() {
  try {
    validate();
    var raw = gv('ct').trim();
    if (!raw) throw new Error('Ciphertext is empty');
    var mode  = gv('mode');
    var ctFmt = gv('ctFmt');
    var keyWA = toWA(gv('key').trim(), gv('keyFmt'));
    var ivWA  = mode !== 'ECB' ? toWA(gv('iv').trim(), gv('ivFmt')) : undefined;
    var ctWA  = ctFmt === 'base64' ? CryptoJS.enc.Base64.parse(raw) : CryptoJS.enc.Hex.parse(raw);
    var opts  = { mode: CryptoJS.mode[mode], padding: CryptoJS.pad[gv('pad')] };
    if (ivWA) opts.iv = ivWA;
    var dec = CryptoJS.AES.decrypt({ ciphertext: ctWA }, keyWA, opts);
    var pFmt = gv('ptFmt'), out;
    if (pFmt === 'utf8') {
      out = dec.toString(CryptoJS.enc.Utf8);
      if (!out && dec.sigBytes > 0)
        throw new Error('Result is not valid UTF-8 - switch Plaintext format to Hex or Base64');
    } else {
      out = waToStr(dec, pFmt);
    }
    if (!out) throw new Error('Decryption returned empty output - check key, IV, mode and formats');
    sv('pt', out);
    showStatus('Decryption successful', 'success');
  } catch(e) { showStatus(e.message, 'error'); console.error(e); }
}

// ─── Swap ─────────────────────────────────────────────────────────────────────
function swapPanels() {
  var a = gv('ct'), b = gv('pt');
  sv('ct', b); sv('pt', a);
  showStatus('Panels swapped', 'success');
}

// ─── Clipboard / download ─────────────────────────────────────────────────────
function copyText(id) {
  var v = gv(id);
  if (!v) { showStatus('Nothing to copy', 'warn'); return; }
  var done = function(){ showStatus('Copied to clipboard', 'success'); };
  var fail = function(){ try { $(id).select(); document.execCommand('copy'); done(); } catch(e){ showStatus('Copy failed', 'error'); } };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(v).then(done).catch(fail);
  else fail();
}

function clearField(id) { sv(id, ''); showStatus('Cleared', 'success'); }

function dlText(id, name) {
  var v = gv(id);
  if (!v) { showStatus('Nothing to save', 'warn'); return; }
  var a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([v], { type:'text/plain' }));
  a.download = name; a.click(); URL.revokeObjectURL(a.href);
  showStatus('Download started', 'success');
}

// ─── Status ───────────────────────────────────────────────────────────────────
var _st;
function showStatus(msg, type) {
  type = type || 'success';
  var s = $('status');
  s.textContent = msg; s.className = 'status ' + type; s.style.display = 'block';
  clearTimeout(_st); _st = setTimeout(function(){ s.style.display = 'none'; }, 3500);
}

// ─── Share URL ────────────────────────────────────────────────────────────────
// Encodes ALL field values (including key, iv, ct, pt) + settings into the URL hash.
// Uses URL-safe base64 (no +/= chars) so no percent-encoding is needed and
// URLSearchParams parses it cleanly on every browser incl. file:// URLs.

function b64uEnc(str) {
  // encode unicode string → URL-safe base64
  var bytes = new TextEncoder().encode(str);
  var binary = '';
  bytes.forEach(function(b){ binary += String.fromCharCode(b); });
  return btoa(binary).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}

function b64uDec(str) {
  // decode URL-safe base64 → unicode string
  str = str.replace(/-/g,'+').replace(/_/g,'/');
  while (str.length % 4) str += '=';
  var binary = atob(str);
  var bytes = new Uint8Array(binary.length);
  for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return new TextDecoder().decode(bytes);
}

function shareConfig() {
  // Include all settings AND all field data so recipient gets a fully loaded tool
  var state = {
    v:      2,                  // schema version
    mode:   gv('mode'),
    pad:    gv('pad'),
    keyFmt: gv('keyFmt'),
    ivFmt:  gv('ivFmt'),
    ctFmt:  gv('ctFmt'),
    ptFmt:  gv('ptFmt'),
    key:    gv('key'),
    iv:     gv('iv'),
    ct:     gv('ct'),
    pt:     gv('pt')
  };
  try {
    var encoded = b64uEnc(JSON.stringify(state));
    var url = window.location.href.split('#')[0] + '#s=' + encoded;
    var done = function(){ showStatus('Share URL copied to clipboard', 'success'); };
    if (navigator.clipboard && navigator.clipboard.writeText)
      navigator.clipboard.writeText(url).then(done).catch(function(){ fallbackCopy(url); });
    else fallbackCopy(url);
  } catch(e) { showStatus('Could not generate URL', 'error'); console.error(e); }
}

function fallbackCopy(text) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand('copy'); showStatus('Share URL copied to clipboard', 'success'); }
  catch(e) { prompt('Copy this URL:', text); }
  document.body.removeChild(ta);
}

// ─── Load state from hash ─────────────────────────────────────────────────────
function loadFromHash() {
  var hash = window.location.hash;
  if (!hash || hash.length < 5) return;
  // strip leading # then parse with URLSearchParams
  var params = new URLSearchParams(hash.slice(1));
  var enc = params.get('s');
  if (!enc) return;
  try {
    var state = JSON.parse(b64uDec(enc));
    // settings
    if (state.mode)   sv('mode',   state.mode);
    if (state.pad)    sv('pad',    state.pad);
    if (state.keyFmt) sv('keyFmt', state.keyFmt);
    if (state.ivFmt)  sv('ivFmt',  state.ivFmt);
    if (state.ctFmt)  sv('ctFmt',  state.ctFmt);
    if (state.ptFmt)  sv('ptFmt',  state.ptFmt);
    // data fields
    if (state.key !== undefined) sv('key', state.key);
    if (state.iv  !== undefined) sv('iv',  state.iv);
    if (state.ct  !== undefined) sv('ct',  state.ct);
    if (state.pt  !== undefined) sv('pt',  state.pt);
    onModeChange();
    updateKeyBadge();
    showStatus('Configuration and data loaded from URL', 'success');
  } catch(e) { console.warn('loadFromHash failed:', e); }
}

// ─── Reset ────────────────────────────────────────────────────────────────────
function resetAll() {
  if (!confirm('Reset all fields and settings?')) return;
  ['ct','pt','key','iv'].forEach(function(id){ sv(id,''); });
  sv('keyFmt','utf8'); sv('ivFmt','utf8');
  sv('mode','CBC');    sv('pad','Pkcs7');
  sv('ctFmt','base64');sv('ptFmt','utf8');
  try { history.replaceState(null,'', location.pathname + location.search); } catch(e){}
  onModeChange(); updateKeyBadge();
  showStatus('Reset complete', 'success');
}

// ─── Theme ────────────────────────────────────────────────────────────────────
function toggleTheme() {
  var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('aes-theme', next);
  applyThemeIcon(next);
}
function applyThemeIcon(t) {
  var ic = $('themeIcon');
  ic.className = t === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
}
function loadTheme() {
  var t = localStorage.getItem('aes-theme') || 'light';
  document.documentElement.setAttribute('data-theme', t);
  applyThemeIcon(t);
}

// ─── Keyboard shortcuts ───────────────────────────────────────────────────────
document.addEventListener('keydown', function(e) {
  if (!(e.ctrlKey || e.metaKey)) return;
  var k = e.key.toLowerCase();
  if (k==='e') { e.preventDefault(); doEncrypt(); }
  if (k==='d') { e.preventDefault(); doDecrypt(); }
  if (k==='r') { e.preventDefault(); resetAll(); }
});

// ─── Init ─────────────────────────────────────────────────────────────────────
loadTheme();
loadFromHash();
onModeChange();
updateKeyBadge();
window.addEventListener('hashchange', loadFromHash);
</script>
