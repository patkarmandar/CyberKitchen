<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSA Encrypt / Decrypt Tool</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --bg:     #f8fafc;
      --surf:   #ffffff;
      --inset:  #f1f5f9;
      --inset2: #e4eaf1;
      --txt:    #0f172a;
      --muted:  #64748b;
      --acc:    #3b82f6;
      --ok:     #10b981;
      --err:    #ef4444;
      --warn:   #f59e0b;
      --bdr:    #e2e8f0;
      --shd:    rgba(0,0,0,.07);
    }
    [data-theme="dark"] {
      --bg:    #0d1117;  --surf:  #161b22;
      --inset: #21262d;  --inset2:#2d333b;
      --txt:   #e6edf3;  --muted: #8b949e;
      --bdr:   #30363d;  --shd:   rgba(0,0,0,.4);
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { overflow-x: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14.5px; background: var(--bg); color: var(--txt);
      padding: 10px 14px; line-height: 1.5;
      transition: background .25s, color .25s;
      overflow-x: hidden;
    }

    /* Header */
    .container { max-width: 1800px; margin: 0 auto; }
    header {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      margin-bottom: 10px; min-height: 38px;
    }
    .hdr-left  { display: flex; align-items: center; justify-content: flex-start; min-width: 0; }
    .hdr-right { display: flex; align-items: center; justify-content: flex-end; gap: 6px; min-width: 0; }
    h1 {
      text-align: center;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      padding: 0 8px;
      font-size: 22px; font-weight: 800; letter-spacing: -.3px;
      background: linear-gradient(130deg, #f59e0b 0%, #ef4444 50%, #8b5cf6 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .home-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 600; color: var(--muted);
      text-decoration: none; padding: 5px 10px;
      border: 1px solid var(--bdr); border-radius: 7px;
      background: var(--surf); transition: all .18s;
      white-space: nowrap; overflow: hidden; min-width: 0;
    }
    .home-link:hover { color: var(--acc); border-color: var(--acc); background: var(--inset); }
    .home-link i { font-size: 12px; flex-shrink: 0; }
    @media (max-width: 540px) {
      .home-link .link-text { display: none; }
      .home-link { padding: 5px 8px; gap: 4px; }
    }
    .icon-btn {
      width: 34px; height: 34px; border-radius: 8px;
      background: var(--surf); border: 1px solid var(--bdr);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 14px; transition: all .2s;
    }
    .icon-btn:hover { border-color: var(--acc); color: var(--acc); transform: scale(1.08); }

    /* Layout */
    .layout { display: grid; grid-template-columns: 1fr 350px 1fr; gap: 10px; }
    .panel {
      background: var(--surf); border: 1px solid var(--bdr);
      border-radius: 10px; padding: 12px;
      box-shadow: 0 1px 4px var(--shd);
      display: flex; flex-direction: column; gap: 8px;
      height: calc(100vh - 70px); min-height: 520px; max-height: 820px;
    }
    .panel-hdr {
      font-size: 13px; font-weight: 700; letter-spacing: .03em;
      color: var(--txt); display: flex; align-items: center; gap: 6px; flex-shrink: 0;
    }
    .panel-hdr i { font-size: 13px; color: var(--muted); }

    /* Toolbar */
    .toolbar { display: flex; align-items: center; gap: 5px; flex-wrap: nowrap; flex-shrink: 0; }
    .tb-sep  { width: 1px; height: 14px; background: var(--bdr); flex-shrink: 0; margin: 0 2px; }
    .tb-fill { flex: 1; min-width: 0; }
    .tb-label { font-size: 12px; color: var(--txt); white-space: nowrap; flex-shrink: 0; font-weight: 700; }
    @media (max-width: 600px) {
      .toolbar { gap: 4px; }
      .toolbar .btn-text { display: none; }
      .btn.xs { padding: 4px 7px; font-size: 12px; }
      .swap-btn .swap-text { display: none; }
      .swap-btn { padding: 4px 7px; }
      .tb-sep { display: none; }
    }

    /* Main textareas (ciphertext / plaintext) */
    textarea {
      flex: 1; width: 100%; resize: none; min-height: 0;
      padding: 9px 10px;
      font-family: 'SF Mono', 'Fira Code', 'Menlo', 'Consolas', monospace;
      font-size: 14px; line-height: 1.65;
      background: var(--inset); color: var(--txt);
      border: 1px solid var(--bdr); border-radius: 7px;
      outline: none !important; box-shadow: none !important;
      transition: border-color .18s;
    }
    textarea:focus { border-color: var(--acc); }
    textarea::placeholder { color: var(--muted); opacity: .55; font-style: italic; }
    textarea::-webkit-scrollbar { width: 6px; }
    textarea::-webkit-scrollbar-thumb { background: var(--bdr); border-radius: 3px; }

    /* Controls */
    .ctrl-scroll {
      flex: 1; display: flex; flex-direction: column; gap: 7px;
      overflow-y: auto; min-height: 0; padding-right: 2px;
    }
    .ctrl-scroll::-webkit-scrollbar { width: 4px; }
    .ctrl-scroll::-webkit-scrollbar-thumb { background: var(--bdr); border-radius: 2px; }

    .field { display: flex; flex-direction: column; gap: 3px; }
    .field > label { font-size: 12px; font-weight: 600; color: var(--muted); }
    .field-note { font-size: 10.5px; font-weight: 400; color: var(--muted); margin-left: 4px; }

    /* PEM textareas */
    .pem-ta {
      width: 100%; height: 78px; resize: none;
      padding: 7px 9px;
      font-family: 'SF Mono', 'Fira Code', 'Menlo', 'Consolas', monospace;
      font-size: 10.5px; line-height: 1.5;
      background: var(--inset); color: var(--txt);
      border: 1px solid var(--bdr); border-radius: 6px;
      outline: none !important; box-shadow: none !important;
      transition: border-color .18s;
    }
    .pem-ta:focus { border-color: var(--acc); }
    .pem-ta::placeholder { color: var(--muted); opacity: .6; font-style: italic; }
    .pem-ta::-webkit-scrollbar { width: 5px; }
    .pem-ta::-webkit-scrollbar-thumb { background: var(--bdr); border-radius: 3px; }
    .pem-ta.pem-ok  { border-color: var(--ok)  !important; }
    .pem-ta.pem-err { border-color: var(--err) !important; }

    .pem-row { display: flex; gap: 5px; }

    /* Inputs & selects */
    input[type="text"], select {
      background: var(--inset); color: var(--txt);
      border: 1px solid var(--bdr); border-radius: 6px;
      padding: 6px 8px; font-size: 13px;
      outline: none !important; box-shadow: none !important;
      transition: border-color .18s, background .18s; width: 100%;
      -webkit-appearance: none; appearance: none;
    }
    input:valid, input:invalid,
    input:-webkit-autofill, input:-webkit-autofill:hover, input:-webkit-autofill:focus {
      border-color: var(--bdr) !important; box-shadow: none !important; outline: none !important;
    }
    input[type="text"]:focus, select:focus { border-color: var(--acc); background: var(--bg); }
    select.sm { padding: 5px 5px; font-size: 12px; border-radius: 5px; cursor: pointer; flex-shrink: 0; width: auto; }

    .row2 { display: grid; grid-template-columns: 1fr auto; gap: 6px; align-items: center; }

    /* Badges / info bars */
    .key-status, .info-bar {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--inset); border: 1px solid var(--bdr);
      border-radius: 6px; padding: 4px 9px; font-size: 11px; color: var(--muted);
    }
    .badge {
      font-size: 10px; font-weight: 700; padding: 2px 7px;
      border-radius: 4px; letter-spacing: .04em;
      background: var(--inset2); color: var(--muted);
    }
    .badge-ok   { background: rgba(16,185,129,.15); color: #10b981; }
    .badge-err  { background: rgba(239,68,68,.15);  color: var(--err); }
    .badge-inf  { background: rgba(59,130,246,.15);  color: #3b82f6; }
    .badge-warn { background: rgba(245,158,11,.15);  color: var(--warn); }

    /* Buttons */
    .btn {
      border: none; border-radius: 6px; font-weight: 400;
      cursor: pointer; display: inline-flex; align-items: center;
      justify-content: center; gap: 5px; transition: all .16s;
      white-space: nowrap; flex-shrink: 0; font-size: 12px;
    }
    .btn:active  { transform: scale(.95); }
    .btn:disabled { opacity: .4; cursor: not-allowed; transform: none !important; filter: none !important; }
    .btn.xs { padding: 4px 8px;  font-size: 12px; }
    .btn.sm { padding: 5px 10px; font-size: 13px; }
    .btn-ghost { background: var(--inset); color: var(--txt); border: 1px solid var(--bdr); }
    .btn-ghost:hover:not(:disabled) { background: var(--inset2); }

    .btn-gen {
      width: 100%; padding: 9px;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      color: #fff; font-size: 13px; font-weight: 700; border-radius: 6px;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: all .18s;
    }
    .btn-gen:hover:not(:disabled) { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 4px 12px var(--shd); }
    .btn-gen:disabled { opacity: .45; cursor: not-allowed; transform: none; filter: none; }

    .btn-enc { flex:1; background: linear-gradient(135deg,#10b981,#059669); color:#fff; padding:9px 12px; font-size:13px; font-weight:700; }
    .btn-dec { flex:1; background: linear-gradient(135deg,#3b82f6,#2563eb); color:#fff; padding:9px 12px; font-size:13px; font-weight:700; }
    .btn-enc:hover:not(:disabled), .btn-dec:hover:not(:disabled) {
      filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 4px 12px var(--shd);
    }

    .swap-btn {
      background: transparent; border: 1px solid var(--bdr);
      color: var(--muted); border-radius: 6px; padding: 4px 8px;
      cursor: pointer; flex-shrink: 0; font-size: 13px;
      display: inline-flex; align-items: center; gap: 4px;
      transition: all .18s; font-weight: 400;
    }
    .swap-btn:hover { color: var(--acc); border-color: var(--acc); }

    .act-row { display: flex; gap: 7px; }
    .bot-row { display: flex; gap: 6px; }
    .divider { height: 1px; background: var(--bdr); flex-shrink: 0; }
    .spacer  { flex: 1; min-height: 2px; }

    /* Status */
    .status {
      padding: 6px 10px; border-radius: 6px; font-size: 13px;
      display: none; flex-shrink: 0; animation: pop .2s ease;
    }
    .status.success { background: rgba(16,185,129,.12); color: var(--ok);   border: 1px solid rgba(16,185,129,.25); }
    .status.error   { background: rgba(239,68,68,.12);  color: var(--err);  border: 1px solid rgba(239,68,68,.25); }
    .status.warn    { background: rgba(245,158,11,.12); color: var(--warn); border: 1px solid rgba(245,158,11,.25); }
    @keyframes pop { from { opacity:0; transform:scale(.97); } to { opacity:1; transform:scale(1); } }

    @media (max-width: 1100px) {
      .layout { grid-template-columns: 1fr; }
      .panel  { height: auto; max-height: none; min-height: 260px; }
      textarea { min-height: 150px; }
    }
    @media (max-width: 600px) { body { padding: 6px 8px; } h1 { font-size: 16px; } }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="hdr-left">
      <a href="/CyberKitchen" class="home-link" title="Back to CyberKitchen">
        <i class="fa-solid fa-arrow-left"></i>
        <span class="link-text">CyberKitchen</span>
      </a>
    </div>
    <h1>RSA Encrypt / Decrypt</h1>
    <div class="hdr-right">
      <button class="icon-btn" id="themeBtn" onclick="toggleTheme()" title="Toggle theme">
        <i class="fa-solid fa-moon" id="themeIcon"></i>
      </button>
    </div>
  </header>

  <div class="layout">

    <!-- LEFT: Ciphertext -->
    <div class="panel">
      <div class="panel-hdr"><i class="fa-solid fa-lock"></i> CIPHERTEXT</div>
      <div class="toolbar">
        <button class="btn btn-ghost xs" onclick="copyText('ct')"><i class="fa-regular fa-copy"></i><span class="btn-text"> Copy</span></button>
        <button class="btn btn-ghost xs" onclick="clearField('ct')"><i class="fa-regular fa-trash-can"></i><span class="btn-text"> Clear</span></button>
        <button class="btn btn-ghost xs" onclick="dlText('ct','ciphertext.txt')"><i class="fa-solid fa-download"></i><span class="btn-text"> Save</span></button>
        <div class="tb-sep"></div>
        <span class="tb-label">Format</span>
        <select class="sm" id="ctFmt">
          <option value="base64">Base64</option>
          <option value="hex">Hex</option>
        </select>
        <div class="tb-fill"></div>
        <button class="swap-btn" onclick="swapPanels()"><i class="fa-solid fa-right-left"></i><span class="swap-text"> Swap</span></button>
      </div>
      <textarea id="ct" placeholder="Paste ciphertext here to decrypt"></textarea>
    </div>

    <!-- MIDDLE: Configuration -->
    <div class="panel">
      <div class="panel-hdr"><i class="fa-solid fa-gear"></i> CONFIGURATION</div>
      <div class="ctrl-scroll">

        <!-- Key size + Generate -->
        <div class="field">
          <label>Key Size</label>
          <div class="row2">
            <select id="keySize">
              <option value="1024">RSA-1024</option>
              <option value="2048" selected>RSA-2048  (recommended)</option>
              <option value="4096">RSA-4096</option>
            </select>
          </div>
        </div>

        <button class="btn-gen" id="genBtn" onclick="generateKeyPair()">
          <i class="fa-solid fa-key" id="genIcon"></i>
          <span id="genLabel">Generate Key Pair</span>
        </button>

        <div class="divider"></div>

        <!-- Public Key -->
        <div class="field">
          <label>Public Key <span class="field-note">(for encryption)</span></label>
          <textarea class="pem-ta" id="pubKey"
            placeholder="-----BEGIN PUBLIC KEY-----&#10;Paste public key here&#10;-----END PUBLIC KEY-----"
            oninput="validatePubKey()" spellcheck="false"></textarea>
          <div class="pem-row">
            <button class="btn btn-ghost xs" onclick="copyPem('pubKey')"><i class="fa-regular fa-copy"></i><span class="btn-text"> Copy</span></button>
            <button class="btn btn-ghost xs" onclick="clearPem('pubKey')"><i class="fa-regular fa-trash-can"></i><span class="btn-text"> Clear</span></button>
            <button class="btn btn-ghost xs" onclick="importPem('pubKey')"><i class="fa-solid fa-folder-open"></i> Import</button>
          </div>
        </div>
        <div class="key-status">
          <span>Public key</span>
          <span class="badge" id="pubBadge">—</span>
        </div>

        <!-- Private Key -->
        <div class="field">
          <label>Private Key <span class="field-note">(for decryption)</span></label>
          <textarea class="pem-ta" id="privKey"
            placeholder="-----BEGIN PRIVATE KEY-----&#10;Paste private key here&#10;-----END PRIVATE KEY-----"
            oninput="validatePrivKey()" spellcheck="false"></textarea>
          <div class="pem-row">
            <button class="btn btn-ghost xs" onclick="copyPem('privKey')"><i class="fa-regular fa-copy"></i><span class="btn-text"> Copy</span></button>
            <button class="btn btn-ghost xs" onclick="clearPem('privKey')"><i class="fa-regular fa-trash-can"></i><span class="btn-text"> Clear</span></button>
            <button class="btn btn-ghost xs" onclick="importPem('privKey')"><i class="fa-solid fa-folder-open"></i> Import</button>
          </div>
        </div>
        <div class="key-status">
          <span>Private key</span>
          <span class="badge" id="privBadge">—</span>
        </div>

        <div class="divider"></div>

        <!-- Padding -->
        <div class="field">
          <label>Padding Scheme / Hash</label>
          <select id="padding" onchange="updateMaxSize()">
            <option value="SHA-256">OAEP + SHA-256  (recommended)</option>
            <option value="SHA-512">OAEP + SHA-512</option>
            <option value="SHA-384">OAEP + SHA-384</option>
            <option value="SHA-1">OAEP + SHA-1  (legacy)</option>
          </select>
        </div>

        <!-- Max plaintext -->
        <div class="info-bar">
          <span>Max plaintext</span>
          <span class="badge badge-inf" id="maxBadge">—</span>
        </div>

        <div class="divider"></div>

        <!-- Decrypt / Encrypt -->
        <div class="act-row">
          <button class="btn btn-dec" id="decBtn" onclick="doDecrypt()">
            <i class="fa-solid fa-lock-open"></i> Decrypt
            <i class="fa-solid fa-arrow-right" style="font-size:11px"></i>
          </button>
          <button class="btn btn-enc" id="encBtn" onclick="doEncrypt()">
            <i class="fa-solid fa-arrow-left" style="font-size:11px"></i>
            <i class="fa-solid fa-lock"></i> Encrypt
          </button>
        </div>

        <div id="status" class="status"></div>

        <div class="spacer"></div>
        <div class="divider"></div>

        <div style="font-size:12px;color:var(--muted);text-align:center;line-height:2;font-weight:700">
          Ctrl+E &nbsp;Encrypt &nbsp;&nbsp; Ctrl+D &nbsp;Decrypt &nbsp;&nbsp; Ctrl+R &nbsp;Reset
        </div>

        <div class="bot-row">
          <button class="btn btn-ghost sm" style="flex:1" onclick="shareConfig()">
            <i class="fa-solid fa-link"></i> Share URL
          </button>
          <button class="btn btn-ghost sm" style="flex:1" onclick="resetAll()">
            <i class="fa-solid fa-rotate"></i> Reset
          </button>
        </div>

      </div>
    </div>

    <!-- RIGHT: Plaintext -->
    <div class="panel">
      <div class="panel-hdr"><i class="fa-regular fa-file-lines"></i> PLAINTEXT</div>
      <div class="toolbar">
        <button class="btn btn-ghost xs" onclick="copyText('pt')"><i class="fa-regular fa-copy"></i><span class="btn-text"> Copy</span></button>
        <button class="btn btn-ghost xs" onclick="clearField('pt')"><i class="fa-regular fa-trash-can"></i><span class="btn-text"> Clear</span></button>
        <button class="btn btn-ghost xs" onclick="dlText('pt','plaintext.txt')"><i class="fa-solid fa-download"></i><span class="btn-text"> Save</span></button>
        <div class="tb-sep"></div>
        <span class="tb-label">Format</span>
        <select class="sm" id="ptFmt" onchange="updateMaxSize()">
          <option value="utf8">UTF-8</option>
          <option value="base64">Base64</option>
          <option value="hex">Hex</option>
        </select>
        <div class="tb-fill"></div>
      </div>
      <textarea id="pt" placeholder="Type or paste plaintext to encrypt"></textarea>
    </div>

  </div>
</div>

<input type="file" id="fileInput" accept=".pem,.txt,.key,.crt,.cer" style="display:none" onchange="onFileSelected()">

<script>
'use strict';

/* ─── Require Web Crypto ─────────────────────────────────────────────────── */
if (!window.crypto || !window.crypto.subtle) {
  document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;text-align:center;padding:20px"><div><h2 style="color:#ef4444">Web Crypto API not available</h2><p style="margin-top:8px;color:#64748b">This tool requires a secure context (HTTPS or localhost).<br>Please serve this file via a local server or HTTPS.</p></div></div>';
  throw new Error('SubtleCrypto unavailable');
}

/* ─── Helpers ────────────────────────────────────────────────────────────── */
var $ = function(id){ return document.getElementById(id); };
function gv(id){ return $(id).value; }
function sv(id,v){ $(id).value = v; }

/* ─── Encoding utilities ─────────────────────────────────────────────────── */
function ab2hex(buf) {
  return Array.from(new Uint8Array(buf), function(b){ return b.toString(16).padStart(2,'0'); }).join('');
}
function hex2ab(hex) {
  hex = hex.replace(/\s/g,'');
  var buf = new Uint8Array(hex.length / 2);
  for (var i=0; i<buf.length; i++) buf[i] = parseInt(hex.slice(i*2,i*2+2),16);
  return buf.buffer;
}
function ab2b64(buf) {
  var bytes = new Uint8Array(buf), bin = '';
  bytes.forEach(function(b){ bin += String.fromCharCode(b); });
  return btoa(bin);
}
function b642ab(b64) {
  var bin = atob(b64.replace(/\s/g,'')), buf = new Uint8Array(bin.length);
  for (var i=0;i<bin.length;i++) buf[i] = bin.charCodeAt(i);
  return buf.buffer;
}
var enc = new TextEncoder(), dec = new TextDecoder();

/* ─── PEM helpers ────────────────────────────────────────────────────────── */
// Strip PEM headers/footers and decode the base64 body to an ArrayBuffer
function pemToAb(pem) {
  var b64 = pem.trim()
    .replace(/-----[A-Z ]+-----/g, '')
    .replace(/\s/g, '');
  return b642ab(b64);
}

// Detect PEM type: returns 'public', 'private', or null
function pemType(pem) {
  pem = pem.trim().toUpperCase();
  if (pem.includes('PUBLIC KEY'))  return 'public';
  if (pem.includes('PRIVATE KEY')) return 'private';
  if (pem.includes('CERTIFICATE')) return 'certificate';
  return null;
}

/* ─── Import keys via SubtleCrypto ──────────────────────────────────────── */
// Returns a Promise<CryptoKey> or rejects with a descriptive error.
function importPublicKey(pem, hash) {
  try {
    var der = pemToAb(pem);
    return crypto.subtle.importKey(
      'spki', der,
      { name: 'RSA-OAEP', hash: { name: hash } },
      true, ['encrypt']
    );
  } catch(e) {
    return Promise.reject(new Error('Invalid public key PEM: ' + e.message));
  }
}

function importPrivateKey(pem, hash) {
  try {
    var der = pemToAb(pem);
    // Try PKCS#8 first (BEGIN PRIVATE KEY), then fall back to PKCS#1 (BEGIN RSA PRIVATE KEY)
    // SubtleCrypto only accepts PKCS#8 — if it's PKCS#1 we must prefix the PKCS#8 header
    var format = pem.trim().toUpperCase().includes('RSA PRIVATE KEY') ? 'pkcs1' : 'pkcs8';
    if (format === 'pkcs1') {
      // Wrap RSA PKCS#1 in a PKCS#8 AlgorithmIdentifier envelope
      der = wrapPkcs1InPkcs8(der);
    }
    return crypto.subtle.importKey(
      'pkcs8', der,
      { name: 'RSA-OAEP', hash: { name: hash } },
      true, ['decrypt']
    );
  } catch(e) {
    return Promise.reject(new Error('Invalid private key PEM: ' + e.message));
  }
}

// Wrap a PKCS#1 RSA private key DER blob in a PKCS#8 envelope so SubtleCrypto accepts it.
// PKCS#8 = SEQUENCE { INTEGER 0, SEQUENCE { OID rsaEncryption, NULL }, OCTET STRING { pkcs1 } }
function wrapPkcs1InPkcs8(pkcs1Der) {
  var pkcs1 = new Uint8Array(pkcs1Der);
  // RSA OID: 1.2.840.113549.1.1.1
  var oid = new Uint8Array([0x30,0x0d,0x06,0x09,0x2a,0x86,0x48,0x86,0xf7,0x0d,0x01,0x01,0x01,0x05,0x00]);
  var version = new Uint8Array([0x02,0x01,0x00]); // INTEGER 0

  // OCTET STRING wrapping the PKCS#1 DER
  var octet = tlv(0x04, pkcs1);
  // Inner SEQUENCE: version + algorithmIdentifier + privateKey
  var inner = concat([version, oid, octet]);
  var outer = tlv(0x30, inner);
  return outer.buffer;
}

function tlv(tag, content) {
  var len = content.length;
  var lenBytes;
  if (len < 128) {
    lenBytes = new Uint8Array([len]);
  } else if (len < 256) {
    lenBytes = new Uint8Array([0x81, len]);
  } else {
    lenBytes = new Uint8Array([0x82, (len >> 8) & 0xff, len & 0xff]);
  }
  return concat([new Uint8Array([tag]), lenBytes, content]);
}

function concat(arrays) {
  var total = arrays.reduce(function(s,a){ return s + a.length; }, 0);
  var out = new Uint8Array(total), off = 0;
  arrays.forEach(function(a){ out.set(a, off); off += a.length; });
  return out;
}

/* ─── Key generation ─────────────────────────────────────────────────────── */
var _generating = false;

function setGenState(busy) {
  _generating = busy;
  $('genBtn').disabled = busy;
  $('genIcon').className = busy ? 'fa-solid fa-spinner fa-spin' : 'fa-solid fa-key';
  $('genLabel').textContent = busy ? 'Generating…' : 'Generate Key Pair';
}

// Export a CryptoKey to PEM string
async function exportPem(key, type) {
  var format = (type === 'public') ? 'spki' : 'pkcs8';
  var header = (type === 'public') ? 'PUBLIC KEY' : 'PRIVATE KEY';
  var der = await crypto.subtle.exportKey(format, key);
  var b64 = ab2b64(der);
  // Break into 64-char lines
  var lines = [];
  for (var i=0; i<b64.length; i+=64) lines.push(b64.slice(i, i+64));
  return '-----BEGIN ' + header + '-----\n' + lines.join('\n') + '\n-----END ' + header + '-----';
}

async function generateKeyPair() {
  if (_generating) return;
  var bits = parseInt(gv('keySize'));
  var hash = gv('padding');
  setGenState(true);
  showStatus('Generating RSA-' + bits + ' key pair…', 'warn');
  try {
    var kp = await crypto.subtle.generateKey(
      { name: 'RSA-OAEP', modulusLength: bits, publicExponent: new Uint8Array([1,0,1]), hash: { name: hash } },
      true, ['encrypt', 'decrypt']
    );
    sv('pubKey',  await exportPem(kp.publicKey,  'public'));
    sv('privKey', await exportPem(kp.privateKey, 'private'));
    setGenState(false);
    validatePubKey();
    validatePrivKey();
    showStatus('RSA-' + bits + ' key pair generated', 'success');
  } catch(e) {
    setGenState(false);
    showStatus('Key generation failed: ' + e.message, 'error');
    console.error(e);
  }
}

/* ─── PEM validation (async, reads key size from the key itself) ─────────── */
async function validatePubKey() {
  var pem = gv('pubKey').trim();
  var ta  = $('pubKey'), bdg = $('pubBadge');
  ta.classList.remove('pem-ok','pem-err');
  bdg.className = 'badge'; bdg.textContent = '—';
  if (!pem) { updateMaxSize(); return; }
  try {
    var key = await importPublicKey(pem, gv('padding'));
    var bits = (await crypto.subtle.exportKey('spki', key)).byteLength * 8;
    // Actual modulus size: derive from the exported key length heuristic isn't perfect;
    // get it properly from the JWK n parameter
    var jwk = await crypto.subtle.exportKey('jwk', key);
    bits = Math.floor(atob(jwk.n.replace(/-/g,'+').replace(/_/g,'/')).length * 8);
    ta.classList.add('pem-ok');
    bdg.className = 'badge badge-ok';
    bdg.textContent = 'RSA-' + bits + ' valid';
    updateMaxSize(bits);
  } catch(e) {
    ta.classList.add('pem-err');
    bdg.className = 'badge badge-err';
    bdg.textContent = 'Invalid PEM';
    updateMaxSize();
  }
}

async function validatePrivKey() {
  var pem = gv('privKey').trim();
  var ta  = $('privKey'), bdg = $('privBadge');
  ta.classList.remove('pem-ok','pem-err');
  bdg.className = 'badge'; bdg.textContent = '—';
  if (!pem) return;
  try {
    var key = await importPrivateKey(pem, gv('padding'));
    var jwk = await crypto.subtle.exportKey('jwk', key);
    var bits = Math.floor(atob(jwk.n.replace(/-/g,'+').replace(/_/g,'/')).length * 8);
    ta.classList.add('pem-ok');
    bdg.className = 'badge badge-ok';
    bdg.textContent = 'RSA-' + bits + ' valid';
  } catch(e) {
    ta.classList.add('pem-err');
    bdg.className = 'badge badge-err';
    bdg.textContent = 'Invalid PEM';
  }
}

/* ─── Max plaintext size ─────────────────────────────────────────────────── */
// OAEP overhead = 2 + 2*hLen + 1 where hLen is the hash output in bytes
var HASH_BYTES = { 'SHA-1': 20, 'SHA-256': 32, 'SHA-384': 48, 'SHA-512': 64 };

function updateMaxSize(bits) {
  var b = $('maxBadge');
  if (!bits) { b.className = 'badge badge-inf'; b.textContent = '—'; return; }
  var keyBytes = bits / 8;
  var hLen     = HASH_BYTES[gv('padding')] || 32;
  var maxBytes = keyBytes - 2 * hLen - 2;   // RSA-OAEP formula
  var ptFmt    = gv('ptFmt');
  var label;
  if      (ptFmt === 'utf8')   label = maxBytes + ' bytes';
  else if (ptFmt === 'base64') label = Math.ceil(maxBytes * 4/3) + ' base64 chars';
  else                         label = (maxBytes * 2) + ' hex chars';
  b.className = 'badge badge-inf';
  b.textContent = label;
}

/* ─── Plaintext encoding / decoding ─────────────────────────────────────── */
function ptToBytes(str, fmt) {
  if (!str) throw new Error('Plaintext is empty');
  if (fmt === 'utf8')   return enc.encode(str).buffer;
  if (fmt === 'base64') return b642ab(str);
  if (fmt === 'hex')    return hex2ab(str);
  throw new Error('Unknown format');
}

function bytesToPt(buf, fmt) {
  if (fmt === 'utf8')   return dec.decode(buf);
  if (fmt === 'base64') return ab2b64(buf);
  if (fmt === 'hex')    return ab2hex(buf);
  throw new Error('Unknown format');
}

/* ─── Encrypt ────────────────────────────────────────────────────────────── */
async function doEncrypt() {
  try {
    var pubPem = gv('pubKey').trim();
    if (!pubPem) throw new Error('Public key is required for encryption');
    var hash   = gv('padding');
    var pubKey = await importPublicKey(pubPem, hash);
    var ptBuf  = ptToBytes(gv('pt'), gv('ptFmt'));
    var ctBuf  = await crypto.subtle.encrypt({ name: 'RSA-OAEP' }, pubKey, ptBuf);
    sv('ct', gv('ctFmt') === 'base64' ? ab2b64(ctBuf) : ab2hex(ctBuf));
    showStatus('Encryption successful', 'success');
  } catch(e) {
    var msg = e.message || 'Encryption failed';
    if (msg.includes('DataError') || msg.includes('too large')) msg = 'Plaintext too large for this key size and padding';
    showStatus(msg, 'error'); console.error(e);
  }
}

/* ─── Decrypt ────────────────────────────────────────────────────────────── */
async function doDecrypt() {
  try {
    var privPem = gv('privKey').trim();
    if (!privPem) throw new Error('Private key is required for decryption');
    var ct = gv('ct').trim();
    if (!ct) throw new Error('Ciphertext is empty');
    var hash    = gv('padding');
    var privKey = await importPrivateKey(privPem, hash);
    var ctBuf   = gv('ctFmt') === 'base64' ? b642ab(ct) : hex2ab(ct);
    var ptBuf   = await crypto.subtle.decrypt({ name: 'RSA-OAEP' }, privKey, ctBuf);
    sv('pt', bytesToPt(ptBuf, gv('ptFmt')));
    showStatus('Decryption successful', 'success');
  } catch(e) {
    var msg = e.message || 'Decryption failed';
    if (msg.includes('OperationError') || msg.includes('decryption'))
      msg = 'Decryption failed — check private key, padding scheme and ciphertext format';
    showStatus(msg, 'error'); console.error(e);
  }
}

/* ─── PEM copy / clear / import ─────────────────────────────────────────── */
function copyPem(id) {
  var v = gv(id);
  if (!v) { showStatus('Nothing to copy', 'warn'); return; }
  (navigator.clipboard && navigator.clipboard.writeText ? navigator.clipboard.writeText(v) : Promise.reject())
    .then(function(){ showStatus('Key copied', 'success'); })
    .catch(function(){ try{ $(id).select(); document.execCommand('copy'); showStatus('Key copied','success'); } catch(e){ showStatus('Copy failed','error'); } });
}

function clearPem(id) {
  sv(id,'');
  if (id==='pubKey')  validatePubKey();
  if (id==='privKey') validatePrivKey();
  showStatus('Key cleared','success');
}

var _fileTarget = null;
function importPem(id) { _fileTarget = id; $('fileInput').value = ''; $('fileInput').click(); }
function onFileSelected() {
  var file = $('fileInput').files[0];
  if (!file || !_fileTarget) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    sv(_fileTarget, e.target.result.trim());
    if (_fileTarget==='pubKey')  validatePubKey();
    if (_fileTarget==='privKey') validatePrivKey();
    showStatus('Key imported from file','success');
  };
  reader.readAsText(file);
}

/* ─── Swap ───────────────────────────────────────────────────────────────── */
function swapPanels() {
  var a=gv('ct'), b=gv('pt'); sv('ct',b); sv('pt',a);
  showStatus('Panels swapped','success');
}

/* ─── Clipboard / download ───────────────────────────────────────────────── */
function copyText(id) {
  var v = gv(id);
  if (!v) { showStatus('Nothing to copy','warn'); return; }
  var ok=function(){ showStatus('Copied to clipboard','success'); };
  var fail=function(){ try{ $(id).select(); document.execCommand('copy'); ok(); } catch(e){ showStatus('Copy failed','error'); } };
  (navigator.clipboard && navigator.clipboard.writeText ? navigator.clipboard.writeText(v) : Promise.reject()).then(ok).catch(fail);
}
function clearField(id) { sv(id,''); showStatus('Cleared','success'); }
function dlText(id, name) {
  var v=gv(id);
  if (!v) { showStatus('Nothing to save','warn'); return; }
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([v],{type:'text/plain'}));
  a.download=name; a.click(); URL.revokeObjectURL(a.href);
  showStatus('Download started','success');
}

/* ─── Status ─────────────────────────────────────────────────────────────── */
var _st;
function showStatus(msg,type) {
  type = type||'success';
  var s=$('status');
  s.textContent=msg; s.className='status '+type; s.style.display='block';
  clearTimeout(_st); _st=setTimeout(function(){ s.style.display='none'; },4000);
}

/* ─── Share URL ──────────────────────────────────────────────────────────── */
function b64uEnc(str) {
  var bytes=new TextEncoder().encode(str), bin='';
  bytes.forEach(function(b){ bin+=String.fromCharCode(b); });
  return btoa(bin).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
function b64uDec(str) {
  str=str.replace(/-/g,'+').replace(/_/g,'/');
  while(str.length%4) str+='=';
  var bin=atob(str), bytes=new Uint8Array(bin.length);
  for(var i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  return new TextDecoder().decode(bytes);
}

function shareConfig() {
  var state = {
    v:1, keySize:gv('keySize'), padding:gv('padding'),
    ctFmt:gv('ctFmt'), ptFmt:gv('ptFmt'),
    pubKey:gv('pubKey'), privKey:gv('privKey'),
    ct:gv('ct'), pt:gv('pt')
  };
  try {
    var url = window.location.href.split('#')[0] + '#s=' + b64uEnc(JSON.stringify(state));
    var ok=function(){ showStatus('Share URL copied to clipboard','success'); };
    (navigator.clipboard && navigator.clipboard.writeText ? navigator.clipboard.writeText(url) : Promise.reject())
      .then(ok).catch(function(){ try{
        var ta=document.createElement('textarea'); ta.value=url;
        ta.style.cssText='position:fixed;top:-9999px;left:-9999px;opacity:0';
        document.body.appendChild(ta); ta.focus(); ta.select();
        document.execCommand('copy'); ok();
        document.body.removeChild(ta);
      }catch(e){ prompt('Copy this URL:',url); }});
  } catch(e) { showStatus('Could not generate URL','error'); }
}

function loadFromHash() {
  var hash=window.location.hash;
  if (!hash||hash.indexOf('s=')===-1) return;
  try {
    var enc2=new URLSearchParams(hash.slice(1)).get('s');
    if (!enc2) return;
    var state=JSON.parse(b64uDec(enc2));
    if(state.keySize) sv('keySize',state.keySize);
    if(state.padding) sv('padding',state.padding);
    if(state.ctFmt)   sv('ctFmt',  state.ctFmt);
    if(state.ptFmt)   sv('ptFmt',  state.ptFmt);
    if(state.pubKey  !==undefined) sv('pubKey',  state.pubKey);
    if(state.privKey !==undefined) sv('privKey', state.privKey);
    if(state.ct      !==undefined) sv('ct',      state.ct);
    if(state.pt      !==undefined) sv('pt',      state.pt);
    validatePubKey(); validatePrivKey();
    showStatus('Configuration and data loaded from URL','success');
  } catch(e){ console.warn('loadFromHash failed:',e); }
}

/* ─── Reset ──────────────────────────────────────────────────────────────── */
function resetAll() {
  if(!confirm('Reset all fields and settings?')) return;
  ['ct','pt','pubKey','privKey'].forEach(function(id){ sv(id,''); });
  sv('keySize','2048'); sv('padding','SHA-256');
  sv('ctFmt','base64'); sv('ptFmt','utf8');
  try{ history.replaceState(null,'',location.pathname+location.search); }catch(e){}
  validatePubKey(); validatePrivKey();
  showStatus('Reset complete','success');
}

/* ─── Theme ──────────────────────────────────────────────────────────────── */
function toggleTheme() {
  var next = document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',next);
  localStorage.setItem('rsa-theme',next);
  $('themeIcon').className = next==='dark'?'fa-solid fa-sun':'fa-solid fa-moon';
}
function loadTheme() {
  var t=localStorage.getItem('rsa-theme')||'light';
  document.documentElement.setAttribute('data-theme',t);
  $('themeIcon').className = t==='dark'?'fa-solid fa-sun':'fa-solid fa-moon';
}

/* ─── Keyboard shortcuts ─────────────────────────────────────────────────── */
document.addEventListener('keydown', function(e) {
  if(!(e.ctrlKey||e.metaKey)) return;
  if(e.key.toLowerCase()==='e'){ e.preventDefault(); doEncrypt(); }
  if(e.key.toLowerCase()==='d'){ e.preventDefault(); doDecrypt(); }
  if(e.key.toLowerCase()==='r'){ e.preventDefault(); resetAll();  }
});

/* ─── Init ───────────────────────────────────────────────────────────────── */
loadTheme();
loadFromHash();
validatePubKey();
validatePrivKey();
window.addEventListener('hashchange', loadFromHash);
</script>
