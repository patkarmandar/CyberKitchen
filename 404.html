<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found · CyberKitchen</title>
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    onerror="this.onerror=null;this.href='https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css'">
  <style>
    :root {
      --bg:#f8fafc; --surf:#ffffff; --inset:#f1f5f9; --inset2:#e4eaf1;
      --txt:#0f172a; --muted:#64748b; --acc:#3b82f6;
      --bdr:#e2e8f0; --shd:rgba(0,0,0,.07);
    }
    [data-theme="dark"] {
      --bg:#0d1117; --surf:#161b22; --inset:#21262d; --inset2:#2d333b;
      --txt:#e6edf3; --muted:#8b949e; --bdr:#30363d; --shd:rgba(0,0,0,.4);
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { overflow-x:hidden; }
    body {
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      font-size:14.5px; background:var(--bg); color:var(--txt);
      min-height:100vh; display:flex; flex-direction:column;
      transition:background .25s, color .25s;
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      display:grid; grid-template-columns:1fr auto 1fr;
      align-items:center; padding:14px 24px; border-bottom:1px solid var(--bdr);
      background:var(--surf);
    }
    .brand {
      display:inline-flex; align-items:center; gap:8px;
      font-size:16px; font-weight:800; letter-spacing:-.3px;
      text-decoration:none;
      background:linear-gradient(130deg,#3b82f6,#8b5cf6);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      background-clip:text;
    }
    .brand i { font-size:16px; -webkit-text-fill-color:#8b5cf6; }
    .hdr-right { display:flex; justify-content:flex-end; }
    .icon-btn {
      width:34px; height:34px; border-radius:8px; background:var(--inset);
      border:1px solid var(--bdr); cursor:pointer; display:flex; align-items:center;
      justify-content:center; color:var(--muted); font-size:14px; transition:all .2s;
    }
    .icon-btn:hover { border-color:var(--acc); color:var(--acc); transform:scale(1.08); }

    /* ── Main ───────────────────────────────────────────────── */
    main {
      flex:1; display:flex; align-items:center; justify-content:center;
      padding:40px 24px;
    }

    .err-wrap {
      text-align:center; max-width:400px; width:100%;
    }

    /* Big 404 */
    .err-code {
      font-size:120px; font-weight:800; line-height:1; letter-spacing:-6px;
      background:linear-gradient(130deg,#3b82f6 0%,#8b5cf6 60%,#ec4899 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      background-clip:text; margin-bottom:4px;
      /* subtle blur double for depth */
      filter:drop-shadow(0 2px 24px rgba(139,92,246,.18));
    }

    .err-title {
      font-size:18px; font-weight:700; margin-bottom:8px; color:var(--txt);
    }
    .err-msg {
      font-size:14px; color:var(--muted); line-height:1.65; margin-bottom:24px;
    }

    .err-path {
      display:inline-flex; align-items:center; gap:6px;
      background:var(--inset); border:1px solid var(--bdr);
      border-radius:6px; padding:5px 12px;
      font-family:'SF Mono','Fira Code','Menlo',monospace;
      font-size:12px; color:var(--muted); margin-bottom:28px;
      max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    }
    .err-path i { font-size:10px; flex-shrink:0; }

    /* Buttons */
    .btn-row { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
    .btn-home {
      display:inline-flex; align-items:center; gap:8px;
      padding:9px 22px; border-radius:8px; font-size:13px; font-weight:700;
      background:linear-gradient(135deg,#3b82f6,#2563eb); color:#fff;
      text-decoration:none; border:none; cursor:pointer;
      transition:all .18s;
    }
    .btn-home:hover { filter:brightness(1.1); transform:translateY(-1px); box-shadow:0 4px 14px rgba(59,130,246,.35); }
    .btn-back {
      display:inline-flex; align-items:center; gap:8px;
      padding:9px 22px; border-radius:8px; font-size:13px; font-weight:700;
      background:var(--inset); color:var(--txt);
      border:1px solid var(--bdr); cursor:pointer;
      text-decoration:none; transition:all .18s;
    }
    .btn-back:hover { background:var(--inset2); }

    /* ── Footer ─────────────────────────────────────────────── */
    footer {
      border-top:1px solid var(--bdr);
      background:var(--surf);
      padding:18px 24px;
    }
    .footer-inner {
      max-width:1200px; margin:0 auto;
      display:flex; align-items:center; justify-content:space-between;
      gap:12px;
    }
    .footer-left {
      font-size:13px; font-weight:700; color:var(--muted);
      letter-spacing:-.1px;
    }
    .footer-center {
      font-size:12px; color:var(--muted);
    }
    .footer-right {
      display:flex; align-items:center;
    }
    .footer-gh {
      display:inline-flex; align-items:center; gap:6px;
      font-size:13px; font-weight:500; color:var(--muted);
      text-decoration:none; transition:color .15s;
    }
    .footer-gh i { font-size:14px; }
    .footer-gh:hover { color:var(--txt); }

    @media (max-width:480px) {
      .err-code  { font-size:80px; letter-spacing:-3px; }
      .err-title { font-size:16px; }
      .footer-inner { flex-direction:column; align-items:center; gap:6px; text-align:center; }
    }
  </style>
</head>
<body>

  <header>
    <a href="/CyberKitchen" class="brand">
      <i class="fa-solid fa-kitchen-set"></i> CyberKitchen
    </a>
    <div></div>
    <div class="hdr-right">
      <button class="icon-btn" onclick="toggleTheme()" title="Toggle theme">
        <i class="fa-solid fa-moon" id="themeIcon"></i>
      </button>
    </div>
  </header>

  <main>
    <div class="err-wrap">
      <div class="err-code">404</div>
      <div class="err-title">Page not found</div>
      <div class="err-msg">The tool or page you're looking for doesn't exist,<br>was moved, or the URL is incorrect.</div>
      <div class="err-path"><i class="fa-solid fa-slash"></i><span id="errPath">/</span></div>
      <div class="btn-row">
        <a href="/CyberKitchen" class="btn-home"><i class="fa-solid fa-house"></i> Back to Home</a>
        <button class="btn-back" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i> Go Back</button>
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-inner">
      <span class="footer-left">&copy; <span id="yr"></span> &middot; MIT License</span>
      <!-- <span class="footer-center">MIT License</span> -->
      <div class="footer-right">
        <a href="https://github.com/patkarmandar/CyberKitchen" target="_blank" rel="noopener" class="footer-gh">
          <i class="fa-brands fa-github"></i> GitHub
        </a>
      </div>
    </div>
  </footer>

<script>
  document.getElementById('errPath').textContent = window.location.pathname || '/';
  document.getElementById('yr').textContent = new Date().getFullYear();

  function toggleTheme() {
    var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('ck-theme', next);
    document.getElementById('themeIcon').className = next === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
  }
  (function () {
    var t = localStorage.getItem('ck-theme') || 'light';
    document.documentElement.setAttribute('data-theme', t);
    document.getElementById('themeIcon').className = t === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
  })();
</script>
</body>
</html>
